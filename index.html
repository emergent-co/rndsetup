  .h-cat .tile{ background:linear-gradient(135deg,#33557E,#1E3A5F); border-radius:16px; aspect-ratio:1/.66; display:flex; align-items:center; justify-content:center; transition:transform .15s; }
  .h-cat:hover .tile{ transform:translateY(-4px); }
  .h-cat .tile svg{ width:46px; height:46px; stroke:#fff; fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
  .h-cat b{ display:block; font-size:15px; font-weight:700; color:var(--ink); margin-top:12px; }
  .h-cat span{ display:block; font-size:12.5px; color:var(--gray-2); margin-top:2px; }

  .h-art-meta{ font-size:12px; color:var(--gray-2); margin-top:8px; }
  .h-art-meta b{ color:var(--green); font-weight:700; }
  @media(max-width:640px){
    .home-main{ padding:24px 20px 56px; }

    .h-promo .p-ill{ display:none; }
    .h-cats{ grid-template-columns:1fr 1fr 1fr; gap:10px; }

<body>
<div id="cellab-header"></div>

<main class="home-main">

          <path d="M60 46v22"/><path d="M50 60l10 10 10-10"/>
          <path d="M40 96h40"/>
        </svg>
      </div>
    </a>

    <!-- 1b) 구매 동선: 소프트웨어 → 펌프 구매 -->

<script src="/assets/site.js" defer></script>
<script>
  var FALLBACK = [
    {type:"setup", title:"뇌 피질 인터페이싱 전자 텐트 전극 — 시린지펌프 TYD01-01", summary:"주입 모듈에서 주입 속도를 정밀 제어. Nature Electronics 2024 셋업.", date:"2026-07-02", url:"/setups/brain-electrode-tyd01.html", image:"/img/og-cover.png", journal:"Nature Electronics"},
    {type:"setup", title:"혈관내 카테터 헤파린 코팅 — 연동펌프 BT101 L", summary:"실리콘 튜브 폐루프 순환 회로 구성. Nature Communications 2024 셋업.", date:"2026-06-30", url:"/setups/catheter-heparin-bt101.html", image:"/img/og-cover.png", journal:"Nature Communications"},
    {type:"setup", title:"연속 CO₂ 포집 — 마그네틱펌프 CT3001F", summary:"anolyte·catholyte 전해액 순환. Nature Communications 2024 셋업.", date:"2026-06-28", url:"/setups/co2-capture-ct3001f.html", image:"/img/og-cover.png", journal:"Nature Communications"}
  ];
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
  function render(items){
    items.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
    document.getElementById('homeArt').innerHTML = items.map(function(p){
      var cat = ({setup:'셋업사례', guide:'실험 가이드'})[p.type] || '아티클';
      var meta = '<b>'+cat+'</b> · ' + [p.date, p.journal].filter(Boolean).join(' · ');
      var img = p.image ? '<img src="'+p.image+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">' : '';
      return '<a class="h-art" href="'+p.url+'">'+
        '<div class="h-art-img">'+img+'</div>'+
        '<div class="h-art-bd"><h3>'+esc(p.title)+'</h3><p>'+esc(p.summary||'')+'</p><div class="h-art-meta">'+meta+'</div></div>'+
      '</a>';
    }).join('');
  }
  fetch('/_build/posts.json').then(function(r){return r.json();}).then(function(d){
    var items = (d.posts||[]).map(function(p){ return {type:p.type, title:p.title, summary:p.summary, date:p.date, url:p.url, image:p.image, journal:p.journal}; });
    render(items.length ? items : FALLBACK);
  }).catch(function(){ render(FALLBACK); });
</script>
