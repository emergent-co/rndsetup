const state = {
  q: "",
  cats: new Set(),
  series: new Set(),
  flow: null
};

// =====================================================
// 매칭 로직
// =====================================================
function flowOverlap(p, preset){
  return p.flow_max >= preset.min && p.flow_min <= preset.max;
}

function matches(p, s = state){
  if (s.cats.size > 0 && !s.cats.has(p.category)) return false;
  if (s.series.size > 0 && !s.series.has(p.series)) return false;
  if (s.flow){
    const preset = FLOW_PRESETS.find(f => f.id === s.flow);
    if (preset && !flowOverlap(p, preset)) return false;
  }
  if (s.q){
    const q = s.q.toLowerCase().trim();
    const hay = [p.id, p.name, p.sub, p.series, p.category_label, ...(p.applications||[]), ...(p.keywords||[])].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function countMatches(s){
  return PRODUCTS.filter(p => matches(p, s)).length;
}

    chip.innerHTML = `${escapeHtml(preset.label)} <span class="count">${count}</span>`;
    chip.addEventListener("click", () => {
      state.flow = (state.flow === preset.id) ? null : preset.id;
      render();
    });
    c.appendChild(chip);
  });
}
