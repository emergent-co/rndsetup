<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --navy:#0a2540;--teal:#1a6e56;--text:#1a2332;--muted:#5a6779;
    --border:#e3e8ef;--bg:#f7f9fc;--accent:#3a7bd5;
  }
  html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:var(--text);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased;word-break:keep-all;overflow-wrap:break-word}
  a{color:var(--teal);text-decoration:none}
  a:hover{text-decoration:underline}

  /* 셀렙 site-header */
  .site-header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
  .site-header-inner{max-width:1180px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:16px}
  .site-logo{font-size:20px;font-weight:800;color:var(--navy);letter-spacing:-.02em;flex:1}
  .site-logo span{color:var(--teal)}
  .site-logo:hover{text-decoration:none}
  .site-nav{flex:1;display:flex;justify-content:center;gap:22px;font-size:13.5px;font-weight:600;color:var(--muted)}
  .site-nav a{color:var(--muted)}
  .site-nav a:hover{color:var(--teal);text-decoration:none}
  .site-nav .active{color:var(--teal)}
  .site-actions{flex:1;display:flex;justify-content:flex-end}
  .site-login{padding:7px 14px;background:#f5f9f7;color:var(--navy);font-size:12.5px;font-weight:700;border-radius:6px;border:1px solid var(--border);text-decoration:none;transition:all .15s}
  .site-login:hover{background:var(--teal);color:#fff;border-color:var(--teal);text-decoration:none}
  @media(max-width:760px){
    .site-nav{position:static;flex:none;gap:14px;font-size:12.5px}
    .site-logo{flex:none}
    .site-actions{flex:none;margin-left:auto}
    .site-header-inner{flex-wrap:wrap}
    .full-specs{grid-template-columns:1fr}
  }

  /* 히어로 */
  .hero{background:#fff;border-bottom:1px solid var(--border);padding:48px 24px 36px}
  .hero-inner{max-width:1180px;margin:0 auto}

  .hero h1{font-size:30px;font-weight:800;color:var(--navy);letter-spacing:-.02em;line-height:1.25;margin-bottom:10px}

  /* 본문 */

  /* 카탈로그 다운로드 박스 */
  .catalog-box{display:flex;align-items:center;gap:16px;padding:16px 20px;background:linear-gradient(135deg,#f5f9f7 0%,#eaf4ee 100%);border:1px solid #d9ead5;border-radius:10px;margin-bottom:22px}
  .catalog-box .ico{flex:0 0 40px;width:40px;height:40px;background:var(--teal);color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;letter-spacing:.04em}
  .catalog-box .txt{flex:1;min-width:0}
  .catalog-box .txt .t{font-size:14px;font-weight:800;color:var(--navy);margin-bottom:2px}
  .catalog-box .txt .d{font-size:12.5px;color:var(--muted)}
  .catalog-box .btn-catalog{flex:0 0 auto;padding:10px 18px;background:var(--teal);color:#fff;border:1px solid var(--teal);border-radius:6px;font-size:13.5px;font-weight:700;text-decoration:none;white-space:nowrap}

  @media(max-width:560px){.catalog-box{flex-direction:column;align-items:stretch;gap:12px;text-align:center}.catalog-box .ico{margin:0 auto}.catalog-box .btn-catalog{width:100%}}

  /* 검색바 */
  .search-wrap{position:relative;margin-bottom:16px}
  .search{
    width:100%;padding:13px 44px 13px 16px;background:#fff;border:1px solid var(--border);
    border-radius:8px;color:var(--text);font:inherit;font-size:15px;outline:none;
    transition:border-color .15s,box-shadow .15s;
  }
  .search:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(26,110,86,.10)}
  .search::placeholder{color:#a9b8cc}
  .search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:transparent;border:0;color:var(--muted);font-size:18px;cursor:pointer;padding:8px 12px;line-height:1;display:none}

  /* 필터 */

  .filter-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;min-width:64px}
  .filter-chips{display:flex;gap:8px;flex-wrap:wrap}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px}
  .card{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;transition:all .15s}

  .badge{font-size:10.5px;font-weight:700;color:var(--teal);background:#f5f9f7;padding:3px 8px;border-radius:8px;white-space:nowrap;border:1px solid #d9ead5}

  .specs{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
  .spec{display:flex;gap:10px;font-size:13px;line-height:1.45}
  .spec-k{color:var(--muted);min-width:46px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;padding-top:3px}
  .spec-v{color:var(--text)}
  .spec-v .num{font-weight:700;color:var(--navy)}

  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
  .tag{font-size:10.5px;color:var(--teal);background:#f5f9f7;padding:2px 8px;border-radius:8px;font-weight:600}
  .tag.comm{color:var(--navy);background:#e8eef7;border:1px solid #d4dde9}

  .details{border-top:1px solid var(--border);margin-top:auto}
  .details summary{padding:10px 0 4px;cursor:pointer;color:var(--muted);font-size:12.5px;list-style:none;display:flex;align-items:center;justify-content:space-between;user-select:none}
  .details summary::-webkit-details-marker{display:none}
  .details summary::after{content:"▾";font-size:10px;color:var(--muted);transition:transform .15s}
  .details[open] summary::after{transform:rotate(180deg)}
  .details summary:hover{color:var(--teal)}
  .head-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
  .head-table th,.head-table td{padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
  .head-table th{color:var(--muted);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;background:#fafbfd}
  .head-table td{color:var(--text)}
  .head-table tr:last-child td{border-bottom:0}
  .full-specs{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px}
  .full-specs > div{display:flex;flex-direction:column;gap:2px}
  .full-specs .k{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  .full-specs .v{color:var(--text)}

  .cta-row{padding:14px 20px;background:#fafbfd;border-top:1px solid var(--border)}
  .btn-primary{display:block;width:100%;padding:11px 14px;background:var(--teal);color:#fff;border:1px solid var(--teal);border-radius:6px;font:inherit;font-size:14px;font-weight:700;text-align:center;cursor:pointer;text-decoration:none;transition:background .15s}
  .btn-primary:hover{background:#155b48;text-decoration:none}

  .empty{text-align:center;padding:48px;color:var(--muted);font-size:14px;background:#fff;border:1px dashed var(--border);border-radius:10px}

  /* 푸터 */
  .foot{margin-top:48px;padding:24px;text-align:center;color:var(--muted);font-size:12.5px;border-top:1px solid var(--border);background:#fff}
  .foot a{color:var(--muted)}
  .foot a:hover{color:var(--teal)}
</style>

<script>
// =====================================================
// Lead Fluid 제품 데이터 (BT101S 1건 — 향후 동일 스키마로 추가)
// =====================================================
let PRODUCTS = [];  // _build/catalog.json에서 fetch로 로드 (SSOT)

// =====================================================
// 필터 정의
// =====================================================
const CATEGORIES = [
  { id: "peristaltic", label: "페리스탈틱" },
  { id: "syringe",     label: "시린지" },
  { id: "gear",        label: "기어" }
];

const SERIES = [
  { id: "S",          label: "S Speed (페리스탈틱)" },
  { id: "L",          label: "L Intelligent (페리스탈틱)" },
  { id: "F",          label: "F Dispensing (페리스탈틱)" },
  { id: "Industrial", label: "Industrial WG (페리스탈틱)" },
  { id: "Batch",      label: "Batch JP (페리스탈틱)" },
  { id: "Filling",    label: "Filling System (페리스탈틱)" },
  { id: "HighProt",   label: "High Protection (페리스탈틱)" },
  { id: "EX",         label: "Explosion-proof (페리스탈틱/기어)" },
  { id: "TYD",        label: "TYD Laboratory (시린지)" },
  { id: "TFD",        label: "TFD Split (시린지)" },
  { id: "TYS",        label: "TYS Industrial (시린지)" },
  { id: "TGD",        label: "TGD High Pressure (시린지)" },
  { id: "TSD",        label: "TSD Push-pull (시린지)" },
  { id: "G-Ind",      label: "G-Series Industrial (시린지)" },
  { id: "CT-Gear",    label: "CT Lab Gear (기어)" }
];

const FLOW_PRESETS = [
  { id: "micro", label: "마이크로 <1 mL/min", min: 0,     max: 1 },
  { id: "low",   label: "저 1-100 mL/min",    min: 1,     max: 100 },
  { id: "mid",   label: "중 100-1000 mL/min", min: 100,   max: 1000 },
  { id: "high",  label: "고 1-10 L/min",      min: 1000,  max: 10000 },
  { id: "xhigh", label: "초대 10+ L/min",     min: 10000, max: Infinity }
];

// =====================================================
// 상태
// =====================================================
const state = {
  q: "",
  cats: new Set(),
  series: new Set(),
  flow: null
};

// =====================================================
// 매칭 로직
// =====================================================
function flowOverlap(p, preset){
  return p.flow_max >= preset.min && p.flow_min <= preset.max;
}

function matches(p, s = state){
  if (s.cats.size > 0 && !s.cats.has(p.category)) return false;
  if (s.series.size > 0 && !s.series.has(p.series)) return false;
  if (s.flow){
    const preset = FLOW_PRESETS.find(f => f.id === s.flow);
    if (preset && !flowOverlap(p, preset)) return false;
  }
  if (s.q){
    const q = s.q.toLowerCase().trim();
    const hay = [p.id, p.name, p.sub, p.series, p.category_label, ...(p.applications||[]), ...(p.keywords||[])].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function countMatches(s){
  return PRODUCTS.filter(p => matches(p, s)).length;
}

// =====================================================
// 칩 빌더
// =====================================================
function buildFlowChips(){
  const c = document.getElementById("flowFilters");
  c.innerHTML = "";

  const all = document.createElement("button");
  all.type = "button";
  all.className = "filter-btn" + (state.flow === null ? " active" : "");
  all.textContent = "전체";
  all.addEventListener("click", () => { state.flow = null; render(); });
  c.appendChild(all);

  FLOW_PRESETS.forEach(preset => {
    const count = countMatches({...state, flow: preset.id});
    const chip = document.createElement("button");
    chip.type = "button";
    chip.className = "filter-btn" + (state.flow === preset.id ? " active" : "");
    chip.innerHTML = `${escapeHtml(preset.label)} <span class="count">${count}</span>`;
    chip.addEventListener("click", () => {
      state.flow = (state.flow === preset.id) ? null : preset.id;
      render();
    });
    c.appendChild(chip);
  });
}

function buildMultiChips(containerId, items, stateSet, stateKey){
  const c = document.getElementById(containerId);
  c.innerHTML = "";
  items.forEach(it => {
    const probe = {...state};
    probe[stateKey] = new Set([it.id]);
    const count = countMatches(probe);
    const chip = document.createElement("button");
    chip.type = "button";
    chip.className = "filter-btn" + (stateSet.has(it.id) ? " active" : "");
    chip.innerHTML = `${escapeHtml(it.label)} <span class="count">${count}</span>`;
    chip.addEventListener("click", () => {
      if (stateSet.has(it.id)) stateSet.delete(it.id);
      else stateSet.add(it.id);
      render();
    });
    c.appendChild(chip);
  });
}

// =====================================================
// 렌더
// =====================================================
function render(){
  const list = PRODUCTS.filter(p => matches(p));
  document.getElementById("resultCount").textContent = list.length;
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  if (list.length === 0){
    grid.innerHTML = "";
    empty.style.display = "block";
  } else {
    empty.style.display = "none";
    grid.innerHTML = list.map(renderCard).join("");
  }
  buildFlowChips();
  buildMultiChips("catFilters", CATEGORIES, state.cats, "cats");
  buildMultiChips("seriesFilters", SERIES, state.series, "series");
}

function renderCard(p){
  // 통신 태그 (RS485 / MODBUS / WiFi 등) — 응용분야 태그와 별도 색상
  const commTags = [];
  if (p.comm){
    if (/RS485/i.test(p.comm))  commTags.push("RS485");
    if (/WiFi/i.test(p.comm))   commTags.push("WiFi");
  }
  const commHtml = commTags.map(function(t){return '<span class="tag comm">'+t+'</span>';}).join("");
  const tags = (p.applications||[]).slice(0,5).map(function(a){return '<span class="tag">'+escapeHtml(a)+'</span>';}).join("");
  const more = (p.applications||[]).length > 5 ? '<span class="tag">+'+(p.applications.length-5)+'</span>' : "";
  const imgHtml = p.image
    ? '<div class="card-img"><img src="'+escapeHtml(p.image)+'" alt="'+escapeHtml(p.name)+'" loading="lazy"></div>'
    : '<div class="card-img placeholder">'+escapeHtml(p.name)+'</div>';
  return '<article class="card">'+imgHtml+
    '<div class="card-body">'+
      '<div class="card-head"><h2 class="card-title">'+escapeHtml(p.name)+'</h2><span class="badge">'+escapeHtml(p.series)+' 시리즈</span></div>'+
      '<p class="card-sub">'+escapeHtml(p.sub)+'</p>'+
      '<div class="specs"><div class="spec"><span class="spec-k">유량</span><span class="spec-v"><span class="num">'+escapeHtml(p.flow_display)+'</span></span></div></div>'+
      '<div class="tags">'+commHtml+tags+more+'</div>'+
    '</div>'+
    '<div class="cta-row"><a class="btn-primary" href="/inquiry.html?product='+encodeURIComponent(p.id)+'">견적 문의하기</a></div>'+
  '</article>';
}

function escapeHtml(s){
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, function(c){
    return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c];
  });
}

var $s = document.getElementById("searchInput");
var $c = document.getElementById("searchClear");
if ($s) $s.addEventListener("input", function(e){
  state.q = e.target.value;
  if ($c) $c.classList.toggle("visible", !!state.q);
  render();
});
if ($c) $c.addEventListener("click", function(){
  if ($s) { $s.value = ""; $s.focus(); }
  state.q = "";
  $c.classList.remove("visible");
  render();
});

// === SSOT fetch: _build/catalog.json ===
fetch('/_build/catalog.json', {cache:'no-store'})
  .then(r => { if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(data => {
    PRODUCTS = data.pumps || [];
    render();
  })
  .catch(err => {
    console.error('[Cellab] catalog.json 로드 실패:', err);
    render();
  });
</script>
<div id="cellab-footer"></div>
<script src="/assets/site.js" defer></script>
</body>
</html>
