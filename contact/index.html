<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문의하기 — 실험 상담·수리·개발·견적 | 정량펌프연구소</title>
<meta name="description" content="관류배양·연속배양 등 무인·정밀·재현이 필요한 실험의 펌프 제어 구성 상담. 정량·연동·시린지펌프 무료 수리진단, 제어 소프트웨어 개발 문의, 견적(나비엠알오). 채널 수·유량·운전 시간만 남기면 맞는 구성을 제안드립니다.">
<link rel="canonical" href="https://pumplab.co.kr/contact/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1A1A1A;--gray:#6B6B6B;--gray-2:#9A9A9A;--green:#1A6E56;--green-dk:#155A46;--green-bg:#F6F7F8;--line:#EAEAEA;--bg:#fff;--serif:"Noto Serif KR",Georgia,serif;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:#fff;color:var(--ink);line-height:1.7;word-break:keep-all;overflow-wrap:break-word}
  a{color:inherit}
  .wrap{max-width:660px;margin:0 auto;padding:0 24px}
  .hero{text-align:center;padding:46px 0 10px}
  h1{font-family:var(--serif);font-size:30px;font-weight:700;letter-spacing:-.02em}
  .hero p{margin:12px auto 0;font-size:16px;color:var(--gray)}
  .picker{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:26px 0 8px}
  .pick{border:1px solid var(--line);background:#fff;border-radius:12px;padding:16px 10px;text-align:center;cursor:pointer;font:inherit;transition:.15s}
  .pick:hover{border-color:var(--green)}
  .pick.on{border-color:var(--green);background:var(--green-bg)}
  .pick b{display:block;font-family:var(--serif);font-size:16px;color:var(--ink)}
  .pick span{display:block;font-size:12px;color:var(--gray);margin-top:3px}
  .formcard{border:1px solid var(--line);border-radius:16px;padding:24px 22px;margin:18px 0 50px}
  .formcard label{display:block;font-size:13.5px;font-weight:600;margin-top:14px}
  .formcard input,.formcard select,.formcard textarea{width:100%;margin-top:6px;padding:11px 13px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:15px}
  .formcard textarea{min-height:84px;resize:vertical}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .send{margin-top:20px;width:100%;background:var(--ink);color:#fff;border:0;padding:14px;border-radius:10px;font-weight:700;font-size:16px;cursor:pointer}
  .send:hover{background:#000}
  .send:disabled{opacity:.6;cursor:default}
  .priv{font-size:12.5px;color:var(--gray-2);text-align:center;margin-top:12px}
  .cform{display:none}
  .cform.on{display:block}
  .done{display:none;text-align:center;padding:30px 10px}
  .done.show{display:block}.done .ok{font-size:40px;color:var(--green)}
  .done h3{font-family:var(--serif);font-size:20px;margin:8px 0 6px}.done p{color:var(--gray);font-size:14.5px}
  @media(max-width:560px){.row2{grid-template-columns:1fr}.picker{grid-template-columns:1fr}}
</style>
<link rel="stylesheet" href="/assets/site.css">
</head>
<body>
<div id="pumplab-header"></div>

<section class="hero">
  <div class="wrap">
    <h1>문의하기</h1>
    <p>실험 상담·수리·개발·견적 중 필요한 걸 골라 간단히 남겨주세요.</p>
  </div>
</section>

<div class="wrap">
  <div class="picker">
    <button class="pick on" type="button" data-type="experiment" data-ga="contact_pick_experiment"><b>실험 상담</b><span>맞춤 제어 구성</span></button>
    <button class="pick" type="button" data-type="repair" data-ga="contact_pick_repair"><b>수리 문의</b><span>무료 진단·수리</span></button>
    <button class="pick" type="button" data-type="dev" data-ga="contact_pick_dev"><b>개발 문의</b><span>제어 SW 기능</span></button>
    <button class="pick" type="button" data-type="quote" data-ga="contact_pick_quote"><b>견적 문의</b><span>나비엠알오 구매</span></button>
  </div>

  <div class="formcard">
    <!-- 실험 상담 (기본 탭, 저문턱 — GEO 퍼널 핵심 전환) -->
    <form class="cform on" id="form-experiment" data-label="실험 상담">
      <input type="hidden" name="문의유형" value="실험 상담">
      <label>어떤 실험인가요? (한두 줄) <span style="color:#c00">*</span><textarea name="실험" required placeholder="예: 관류배양 무인 7일 연속 / 채널 3개 독립 유량 / flow chemistry 유량 프로파일 재현"></textarea></label>
      <div class="row2">
        <div><label>채널 수 · 유량 범위<input type="text" name="채널·유량" placeholder="예: 3채널 / 0.1~5 mL/min"></label></div>
        <div><label>운전 시간<input type="text" name="운전시간" placeholder="예: 72시간 무인"></label></div>
      </div>
      <label>연락처(이메일·전화) <span style="color:#c00">*</span><input type="text" name="연락처" required placeholder="you@lab.ac.kr / 010-0000-0000"></label>
      <button class="send" type="submit">실험 상담 신청</button>
      <p class="priv">채널 수·유량·운전 시간만 알려주시면 맞는 제어 구성을 제안드립니다.</p>
    </form>

    <!-- 수리 -->
    <form class="cform" id="form-repair" data-label="수리 문의">
      <input type="hidden" name="문의유형" value="수리 문의">
      <div class="row2">
        <div><label>펌프 모델명 <span style="color:#c00">*</span><input type="text" name="모델명" required placeholder="예: BT100S"></label></div>
        <div><label>제조사 <span style="color:#c00">*</span><input type="text" name="제조사" required placeholder="예: LeadFluid / 기타"></label></div>
      </div>
      <label>증상 <span style="color:#c00">*</span><textarea name="증상" required placeholder="예: 유량이 안 나옴 / 소음 / 안 켜짐 / 누액"></textarea></label>
      <div class="row2">
        <div><label>연락처(이메일·전화) <span style="color:#c00">*</span><input type="text" name="연락처" required placeholder="you@lab.ac.kr / 010-0000-0000"></label></div>
        <div><label>회사·연구실 <span style="color:#c00">*</span><input type="text" name="소속" required placeholder="OO대학교 OO연구실"></label></div>
      </div>
      <button class="send" type="submit">무료 수리진단 신청 보내기</button>
      <p class="priv">진단은 무료입니다. 접수 후 보내실 주소를 안내드립니다.</p>
    </form>

    <!-- 개발 -->
    <form class="cform" id="form-dev" data-label="개발 문의">
      <input type="hidden" name="문의유형" value="개발 문의">
      <label>요청 기능 <span style="color:#c00">*</span><textarea name="요청기능" required placeholder="예: 다중 펌프 동시 제어"></textarea></label>
      <label>사용 상황 / 이유<textarea name="사용상황" placeholder="어떤 실험·작업에서 필요한지"></textarea></label>
      <div class="row2">
        <div><label>이름 / 회사·연구실 <span style="color:#c00">*</span><input type="text" name="이름/소속" required placeholder="홍길동 / OO대학교"></label></div>
        <div><label>이메일 <span style="color:#c00">*</span><input type="email" name="email" required placeholder="you@lab.ac.kr"></label></div>
      </div>
      <button class="send" type="submit">개발 문의 보내기</button>
      <p class="priv">검토 후 개발 요청 게시판에 진행 상황을 공개할 수 있습니다.</p>
    </form>

    <!-- 견적: 나비엠알오 -->
    <div class="cform" id="form-quote" data-label="견적 문의">
      <p style="font-size:15.5px;color:#2a2a2a;line-height:1.75">펌프·소모품 <b>가격은 나비엠알오에서 바로 확인</b>하실 수 있습니다. 기관 구매(세금계산서 발행 등)도 나비엠알오를 통해 진행됩니다.</p>
      <a class="send" href="https://www.navimro.com/s/?x=0&y=0&q=leadfluid&disp=0&keyword=" target="_blank" rel="noopener" data-ga="navimro_pricing_quote" style="display:block;text-align:center;text-decoration:none;margin-top:16px">나비엠알오에서 LeadFluid 가격 확인 →</a>
    </div>

    <div class="done" id="contactDone">
      <div class="ok">✓</div>
      <h3>문의가 접수되었습니다</h3>
      <p>감사합니다.</p>
    </div>
  </div>
</div>

<div id="pumplab-footer"></div>
<script src="/assets/site.js" defer></script>
<script>
  var picks = document.querySelectorAll('.pick');
  var forms = { experiment:'form-experiment', repair:'form-repair', dev:'form-dev', quote:'form-quote' };
  picks.forEach(function(b){
    b.addEventListener('click', function(){
      picks.forEach(function(x){ x.classList.remove('on'); });
      b.classList.add('on');
      Object.keys(forms).forEach(function(k){
        document.getElementById(forms[k]).classList.toggle('on', k === b.dataset.type);
      });
    });
  });
  document.querySelectorAll('.cform').forEach(function(f){
    f.addEventListener('submit', function(e){
      e.preventDefault();
      var btn = f.querySelector('.send'), txt = btn.textContent;
      btn.disabled = true; btn.textContent = '보내는 중…';
      fetch('https://formspree.io/f/mnjkzppj', { method:'POST', body:new FormData(f), headers:{'Accept':'application/json'} })
        .then(function(r){
          if(r.ok){
            if(typeof gtag === 'function'){ gtag('event','generate_lead',{ lead_type:'contact', contact_type:f.dataset.label, page_path:location.pathname }); }
            document.querySelector('.formcard').querySelectorAll('.cform, .picker').forEach(function(x){ x.style.display='none'; });
            document.querySelector('.picker').style.display = 'none';
            f.parentNode.querySelectorAll('.cform').forEach(function(x){ x.style.display='none'; });
            document.getElementById('contactDone').classList.add('show');
          } else { btn.disabled=false; btn.textContent=txt; alert('전송에 실패했습니다. 이메일로 보내주세요: info@pumplab.co.kr'); }
        })
        .catch(function(){ btn.disabled=false; btn.textContent=txt; alert('전송에 실패했습니다. 이메일로 보내주세요: info@pumplab.co.kr'); });
    });
  });
  (function(){ var m={'#experiment':'experiment','#repair':'repair','#dev':'dev','#quote':'quote'}; var t=m[location.hash]; if(t){ var b=document.querySelector('.pick[data-type="'+t+'"]'); if(b) b.click(); } })();
</script>
</body>
</html>
