<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>로그인 — Cellab</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0a2540;--teal:#1a6e56;--text:#1a2332;--muted:#5a6779;--border:#e3e8ef;--bg:#f7f9fc;--soft:#f5f9f7}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:var(--text);background:var(--bg);line-height:1.6}
body{display:grid;place-items:center;padding:24px}
a{color:var(--teal);text-decoration:none}
a:hover{text-decoration:underline}

.lg-card{width:100%;max-width:380px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:32px 28px;box-shadow:0 4px 20px rgba(10,37,64,.06)}
.lg-brand{text-align:center;margin-bottom:6px}
.lg-brand .name{font-size:22px;font-weight:800;color:var(--navy);letter-spacing:-.02em}
.lg-brand .name span{color:var(--teal)}
.lg-brand .sub{font-size:11.5px;color:var(--muted);margin-top:4px;letter-spacing:1.2px;text-transform:uppercase}
.lg-title{text-align:center;font-size:14px;color:var(--muted);margin:18px 0 22px}

.lg-row{margin-bottom:14px}
.lg-row label{display:block;font-size:12.5px;font-weight:700;color:var(--navy);margin-bottom:6px}
.lg-row input{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:6px;font:inherit;font-size:14px;color:var(--text);background:#fff;outline:none}
.lg-row input:focus{border-color:var(--teal)}

.lg-msg{font-size:12.5px;color:#b94545;min-height:18px;margin-bottom:8px}
.lg-msg.ok{color:var(--teal)}

.lg-btn{width:100%;padding:12px;background:var(--teal);color:#fff;border:none;border-radius:6px;font:inherit;font-weight:700;font-size:14px;cursor:pointer;transition:background .15s}
.lg-btn:hover{background:#155b48}
.lg-btn:disabled{background:#bccfc5;cursor:not-allowed}

.lg-back{display:block;text-align:center;margin-top:18px;font-size:12.5px;color:var(--muted)}
  .site-footer{background:#fff;border-top:1px solid var(--border);padding:28px 24px;margin-top:48px}
  .site-footer-inner{max-width:1180px;margin:0 auto;display:flex;flex-direction:column;gap:8px;align-items:center;text-align:center}
  .ft-brand{font-size:14px;font-weight:800;color:var(--navy);letter-spacing:-.01em}
  .ft-brand span{color:var(--teal)}
  .ft-links{font-size:13px;color:var(--muted)}
  .ft-links a{color:var(--muted);text-decoration:none}
  .ft-links a:hover{color:var(--teal)}
  .ft-meta{font-size:12px;color:#a9b8cc}
</style>
</head>
<body>

<form class="lg-card" id="lgForm" autocomplete="off">
  <div class="lg-brand">
    <div class="name"><span>Cellab</span> 셀렙</div>
    <div class="sub">Admin Login</div>
  </div>
  <div class="lg-title">관리자 로그인</div>

  <div class="lg-row">
    <label for="lgId">아이디</label>
    <input type="text" id="lgId" name="id" required autocomplete="username">
  </div>
  <div class="lg-row">
    <label for="lgPw">비밀번호</label>
    <input type="password" id="lgPw" name="pw" required autocomplete="current-password">
  </div>

  <div class="lg-msg" id="lgMsg">&nbsp;</div>

  <button type="submit" class="lg-btn" id="lgBtn">로그인</button>

  <a class="lg-back" href="/index.html">← 홈으로</a>
</form>

<script>
// 클라이언트측 가드 — 실제 보안은 admin.html의 GitHub PAT가 담당.
// 정적 사이트라 페이지 노출 차단은 불가, 어차피 편집은 PAT 없이 안 됨.
const EXPECTED_ID   = 'emgt01';
const EXPECTED_HASH = 'c366945faac178138837638edeeb7cd295393061d7ce44b4302d906fddf3173d';
const SESSION_KEY   = 'cellab_admin_session';
const SESSION_TTL_MS = 8 * 60 * 60 * 1000; // 8시간

async function sha256(s){
  const buf = new TextEncoder().encode(s);
  const h = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

const $form = document.getElementById('lgForm');
const $msg  = document.getElementById('lgMsg');
const $btn  = document.getElementById('lgBtn');

// 이미 세션 있으면 admin으로
try {
  const raw = localStorage.getItem(SESSION_KEY);
  if (raw){
    const { exp } = JSON.parse(raw);
    if (exp && Date.now() < exp) {
      location.replace('/admin.html');
    }
  }
} catch(_){}

$form.addEventListener('submit', async e => {
  e.preventDefault();
  $msg.classList.remove('ok');
  $btn.disabled = true;

  const id = document.getElementById('lgId').value.trim();
  const pw = document.getElementById('lgPw').value;

  if (id !== EXPECTED_ID){
    $msg.textContent = '아이디 또는 비밀번호가 일치하지 않습니다.';
    $btn.disabled = false;
    return;
  }
  const h = await sha256(pw);
  if (h !== EXPECTED_HASH){
    $msg.textContent = '아이디 또는 비밀번호가 일치하지 않습니다.';
    $btn.disabled = false;
    return;
  }

  try {
    localStorage.setItem(SESSION_KEY, JSON.stringify({ id, exp: Date.now() + SESSION_TTL_MS }));
  } catch(_){}

  $msg.classList.add('ok');
  $msg.textContent = '인증 성공. 관리자 페이지로 이동합니다.';
  setTimeout(()=> location.replace('/admin.html'), 600);
});
</script>

<footer class="site-footer">
  <div class="site-footer-inner">
    <div class="ft-brand"><span>Cellab</span> 셀렙</div>
    <div class="ft-links">
      <a href="/leadfluid.html">LEADFLUID</a> ·
      <a href="/recommend.html">펌프 추천</a> ·
      <a href="/reviews.html">펌프셋업 리뷰</a> ·
      <a href="/inquiry.html?setup=general">일반 문의</a>
    </div>
    <div class="ft-meta">
      이머전트(emergent co.) · emgt.yhlee@gmail.com · Lead Fluid 한국 공식 파트너
    </div>
  </div>
</footer>
</body>
</html>
