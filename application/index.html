<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="keywords" content="펌프 셋업 가이드, 응용별 펌프, 세포배양 관류, 발효 정량주입, 마이크로플루이딕, 연동펌프, 정량펌프, Cellab">
<link rel="canonical" href="https://cellab.kr/application/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&display=swap" rel="stylesheet">
<meta property="og:type" content="website">
<meta property="og:title" content="셋업 가이드 — 응용별 펌프 셋업 | 셀렙">

<style>
  :root{
    --ink:#1A1A1A; --gray:#6B6B6B; --gray-2:#9A9A9A;
    --green:#1A6E56; --green-bg:#F3F8F5; --line:#EAEAEA; --bg:#fff;
    --serif:"Noto Serif KR",Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:#fff;color:var(--ink);line-height:1.7;word-break:keep-all;overflow-wrap:break-word}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:880px;margin:0 auto;padding:0 24px}
  .hero{padding:50px 0 6px;text-align:center}
  h1{font-family:var(--serif);font-size:32px;font-weight:700;letter-spacing:-.02em}
  .hero p{margin:14px auto 0;max-width:560px;font-size:16px;color:var(--gray)}
  .glist{display:flex;flex-direction:column;gap:16px;padding:34px 0 56px}
  .gcard{display:flex;align-items:stretch;border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:border-color .15s,box-shadow .15s}
  .gcard:hover{border-color:var(--green);box-shadow:0 8px 22px rgba(0,0,0,.06)}
  .gimg{flex:0 0 220px;background:var(--green-bg);display:flex;align-items:center;justify-content:center;color:var(--gray-2);font-size:12px;font-weight:600;letter-spacing:.04em}
  .gimg img{width:100%;height:100%;object-fit:cover;display:block}
  .gbody{padding:22px 24px;flex:1;min-width:0}
  .gcard .tag{font-size:11.5px;font-weight:700;color:var(--green);letter-spacing:.04em;text-transform:uppercase}
  .gcard h2{font-family:var(--serif);font-size:19px;font-weight:600;margin:7px 0 8px;line-height:1.35}
  .gcard p{font-size:14.5px;color:var(--gray);line-height:1.65;margin-bottom:12px}
  .gcard .more{font-size:14px;font-weight:600;color:var(--ink);border-bottom:2px solid var(--green);padding-bottom:2px}
  .soon{border:1px dashed var(--line);border-radius:14px;padding:22px;text-align:center;color:var(--gray-2);font-size:14px}
  @media(max-width:640px){.gcard{flex-direction:column}.gimg{flex:none;height:170px}}
</style>
<link rel="stylesheet" href="/assets/site.css">
</head>
<body>
<div id="cellab-header"></div>

<section class="hero">
  <div class="wrap">
    <h1>셋업 가이드</h1>
    <p>실험 응용별로 어떤 펌프·튜브·제어 구성이 맞는지 정리했습니다. 모델명을 몰라도, 응용에 맞춰 바로 견적까지.</p>
  </div>
</section>

<div class="wrap">
  <div class="glist">
    <a class="gcard" href="/application/cell-culture-perfusion.html">
      <div class="gimg">이미지 준비중</div>
      <div class="gbody">
        <div class="tag">세포배양 · 관류</div>
        <h2>세포배양 관류 펌프 — 무오염 연속 관류 셋업</h2>
        <p>관류 배양의 오염·유량 흔들림을 잡는 연동(페리스탈틱)펌프 셋업과 모델 선택 기준.</p>
        <span class="more">자세히 →</span>
      </div>
    </a>
    <div class="soon">발효 정량주입 · 마이크로플루이딕 등 추가 예정</div>
  </div>
</div>

<div id="cellab-footer"></div>
<script src="/assets/site.js" defer></script>
</body>
</html>
