<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cellab feed — 실험 펌프·제어·수리 인사이트</title>
<meta name="description" content="연동·정량·시린지펌프 활용, 소프트웨어 제어, 수리·A/S, 논문 셋업 분석까지. 연구실에서 바로 쓰는 실험 펌프 인사이트 매거진.">
<link rel="canonical" href="https://cellab.kr/blog/">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --blue:#3182F6; --blue-dk:#1B64DA; --blue-lt:#EAF2FE;
    --ink:#191F28; --gray:#4E5968; --gray-2:#8B95A1; --line:#E5E8EB; --bg:#fff; --soft:#F2F4F6;
    --sans:"Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:#fff;color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;word-break:keep-all}
  a{text-decoration:none;color:inherit}
  /* 상단 바 */
  .tb{position:sticky;top:0;z-index:30;height:60px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px}
  .logo{font-size:20px;font-weight:800;letter-spacing:-.03em;display:flex;align-items:center;gap:8px}
  .logo::before{content:"";width:16px;height:16px;border-radius:50%;background:var(--blue)}
  .logo span{color:var(--blue)}
  .tb-right{display:flex;align-items:center;gap:12px}
  .search{display:flex;align-items:center;gap:8px;background:var(--soft);border-radius:10px;padding:9px 14px;width:220px}
  .search svg{width:16px;height:16px;stroke:var(--gray-2);fill:none;stroke-width:2}
  .search input{border:0;background:none;outline:none;font:inherit;font-size:14px;width:100%;color:var(--ink)}
  .tb-cta{background:var(--blue);color:#fff;font-weight:700;font-size:14px;padding:10px 16px;border-radius:10px;white-space:nowrap}
  .tb-cta:hover{background:var(--blue-dk)}
  /* 레이아웃 */
  .layout{display:grid;grid-template-columns:280px 1fr;max-width:1180px;margin:0 auto}
  .side{position:sticky;top:60px;align-self:start;height:calc(100vh - 60px);overflow-y:auto;padding:24px 16px 40px;border-right:1px solid var(--line)}
  .s-item{display:flex;align-items:center;gap:11px;padding:10px 14px;border-radius:10px;font-size:15px;font-weight:600;color:var(--gray);margin-bottom:2px}
  .s-item svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto}
  .s-item:hover{background:var(--soft);color:var(--ink)}
  .s-item.active{background:var(--blue-lt);color:var(--blue)}
  .s-sub{padding:4px 0 10px 44px;display:flex;flex-direction:column;gap:9px}
  .s-sub a{font-size:13.5px;color:var(--gray-2);font-weight:500}
  .s-sub a:hover{color:var(--ink)}
  .s-gap{height:14px}
  /* 본문 */
  .main{padding:28px 40px 80px;max-width:840px}
  /* 히어로 프로모 */
  .promo{display:flex;align-items:center;justify-content:space-between;gap:20px;background:linear-gradient(115deg,#3182F6,#1B64DA);border-radius:20px;padding:34px 36px;color:#fff;overflow:hidden}
  .promo .p-sub{font-size:13px;font-weight:700;opacity:.85;margin-bottom:8px}
  .promo h2{font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1.32}
  .promo .p-btn{display:inline-block;margin-top:20px;background:#fff;color:var(--blue);font-weight:800;font-size:14px;padding:11px 20px;border-radius:10px}
  .promo .p-ill{flex:0 0 auto}
  .promo .p-ill svg{width:150px;height:120px;display:block}
  /* 섹션 제목 */
  .sec-t{font-size:22px;font-weight:800;letter-spacing:-.02em;margin:44px 0 20px}
  /* 카테고리 타일 */
  .cat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .cat{display:block}
  .cat .tile{border-radius:16px;aspect-ratio:1/.72;display:flex;align-items:center;justify-content:center;transition:transform .15s}
  .cat:hover .tile{transform:translateY(-4px)}
  .cat .tile svg{width:52px;height:52px;stroke:#fff;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  .cat.c1 .tile{background:linear-gradient(135deg,#FF8A3D,#FF6B35)}
  .cat.c2 .tile{background:linear-gradient(135deg,#4C8DFF,#3182F6)}
  .cat.c3 .tile{background:linear-gradient(135deg,#9B6BFF,#7C4DFF)}
  .cat b{display:block;font-size:15px;font-weight:700;margin-top:12px}
  .cat span{display:block;font-size:13px;color:var(--gray-2);margin-top:2px}
  /* 아티클 리스트 */
  .art{display:flex;gap:22px;padding:22px 0;border-bottom:1px solid var(--line)}
  .art:first-child{padding-top:6px}
  .art-img{flex:0 0 168px;width:168px;height:108px;border-radius:12px;overflow:hidden;background:var(--soft)}
  .art-img img{width:100%;height:100%;object-fit:cover;display:block}
  .art-bd{min-width:0;display:flex;flex-direction:column;justify-content:center}
  .art-bd h3{font-size:17px;font-weight:700;letter-spacing:-.01em;line-height:1.4;margin-bottom:7px}
  .art:hover h3{color:var(--blue)}
  .art-bd p{font-size:14px;color:var(--gray);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .art-meta{font-size:12.5px;color:var(--gray-2);margin-top:9px}
  /* 반응형 */
  @media(max-width:900px){
    .layout{grid-template-columns:1fr}
    .side{display:none}
    .main{padding:24px 20px 60px;max-width:none}
    .search{display:none}
  }
  @media(max-width:560px){
    .promo{flex-direction:column;align-items:flex-start;padding:26px 24px}
    .promo .p-ill{display:none}
    .promo h2{font-size:22px}
    .cat-row{grid-template-columns:1fr 1fr 1fr;gap:10px}
    .cat .tile svg{width:34px;height:34px}
    .cat b{font-size:13px}.cat span{display:none}
    .art{gap:14px}
    .art-img{flex-basis:110px;width:110px;height:74px}
    .art-bd p{-webkit-line-clamp:2}
  }
</style>
</head>
<body>

<header class="tb">
  <a class="logo" href="/">Cellab <span>feed</span></a>
  <div class="tb-right">
    <label class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input type="search" placeholder="검색" aria-label="검색"></label>
    <a class="tb-cta" href="/contact/#repair">무료 수리진단</a>
  </div>
</header>

<div class="layout">
  <aside class="side">
    <a class="s-item active" href="/blog/"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>홈</a>
    <a class="s-item" href="/contact/#repair"><svg viewBox="0 0 24 24"><path d="M14 7a4 4 0 0 1-5.5 3.7L4 15l-1 4 4-1 4.3-4.5A4 4 0 0 1 14 7z"/></svg>수리·A/S</a>
    <a class="s-item" href="/application/"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v3M12 18v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M3 12h3M18 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>펌프 활용</a>
    <a class="s-item" href="/requests/"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>소프트웨어 제어</a>
    <a class="s-item" href="/blog/"><svg viewBox="0 0 24 24"><path d="M9 3v13M15 8v13"/><path d="M4 6h5l6-3v13l-6-3H4z"/></svg>응용·논문 분석</a>
    <a class="s-item" href="/blog/"><svg viewBox="0 0 24 24"><path d="M3 11v2a1 1 0 0 0 1 1h3l5 4V6L7 10H4a1 1 0 0 0-1 1z"/><path d="M16 9a4 4 0 0 1 0 6"/></svg>소식</a>
    <div class="s-gap"></div>
    <a class="s-item" href="/"><svg viewBox="0 0 24 24"><path d="M13 5l7 7-7 7M20 12H4"/></svg>cellab.kr 홈</a>
  </aside>

  <main class="main">
    <!-- 히어로 프로모 -->
    <a class="promo" href="/contact/#repair">
      <div class="p-tx">
        <div class="p-sub">Cellab A/S · 브랜드 무관</div>
        <h2>고장난 연동·정량·시린지펌프,<br>무료로 진단해 드립니다</h2>
        <span class="p-btn">무료 수리진단 신청 →</span>
      </div>
      <div class="p-ill" aria-hidden="true">
        <svg viewBox="0 0 150 120" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="14" width="138" height="92" rx="14" fill="rgba(255,255,255,.14)"/>
          <g transform="translate(30,34) scale(2.6)" fill="rgba(255,255,255,.9)"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></g>
        </svg>
      </div>
    </a>

    <!-- 카테고리 -->
    <section>
      <h2 class="sec-t">가이드 A-Z</h2>
      <div class="cat-row">
        <a class="cat c1" href="/contact/#repair">
          <div class="tile"><svg viewBox="0 0 24 24"><path d="M14 7a4 4 0 0 1-5.5 3.7L4 15l-1 4 4-1 4.3-4.5A4 4 0 0 1 14 7z"/></svg></div>
          <b>수리·A/S</b><span>무료 진단·고장 해결</span>
        </a>
        <a class="cat c2" href="/application/">
          <div class="tile"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v3M12 18v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M3 12h3M18 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg></div>
          <b>펌프 활용</b><span>선택·튜브·셋업</span>
        </a>
        <a class="cat c3" href="/requests/">
          <div class="tile"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4M7 9l3 3-3 3M13 15h4"/></svg></div>
          <b>소프트웨어 제어</b><span>유량·시퀀스·모니터링</span>
        </a>
      </div>
    </section>

    <!-- 최신 아티클 -->
    <section>
      <h2 class="sec-t">최신 아티클</h2>
      <div class="art-list" id="artList"></div>
    </section>
  </main>
</div>

<script>
  // 블로그 글: _build/posts.json 을 fetch (실패 시 폴백)
  var FALLBACK = [
    {title:"관류 배양을 논문처럼 재현하려면 펌프 제어를 어떻게 해야 하나 — bIUreactor(Butch 2024) 분석", summary:"오픈소스 3D 조직 플랫폼 bIUreactor는 연동펌프로 산소화 관류를 구현합니다. 다채널 독립 유량·장시간 무인 안정성·유량 프로파일 재현에서 확장 병목이 생깁니다.", date:"2026-07-02", url:"/blog/biureactor-perfusion.html", image:"/img/og-cover.png", journal:"Annals of Biomedical Engineering"},
    {title:"농축 태양광 하 droplet 증발 데이터가 흔들린다면 — 펌프 + 저울 피드백 조합이 답", summary:"솔라 스팀·광열 변환 실험에서 droplet 공급이 흔들리면 펌프 선택이 원인입니다. BT101 + 전자저울 피드백 셋업의 3가지 디테일.", date:"2026-05-08", url:"/blog/bt101-solar-droplet-feedback.html", image:"/blog/img/bt101-solar-droplet-feedback.svg", journal:"Advanced Science"},
    {title:"ex vivo 카테터 시험 데이터가 매번 흔들린다면 — 회로 설계가 답일 수 있습니다", summary:"같은 코팅인데 ex vivo 결과가 재현 안 되거나 누적 데이터를 못 뽑고 계시다면, 회로 설계가 원인입니다. BT101 셋업의 3가지 디테일.", date:"2026-05-07", url:"/blog/bt101-ex-vivo-catheter.html", image:"/blog/img/bt101-ex-vivo-catheter.svg", journal:"Nature Communications"}
  ];
  function render(posts){
    posts.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
    document.getElementById('artList').innerHTML = posts.map(function(p){
      var img = p.image || '/img/og-cover.png';
      var meta = [p.date, p.journal].filter(Boolean).join(' · ');
      return '<a class="art" href="'+p.url+'">'+
        '<div class="art-img"><img src="'+img+'" alt="" loading="lazy" onerror="this.style.display=\'none\'"></div>'+
        '<div class="art-bd"><h3>'+p.title+'</h3><p>'+(p.summary||'')+'</p><div class="art-meta">'+meta+'</div></div>'+
      '</a>';
    }).join('');
  }
  fetch('/_build/posts.json').then(function(r){return r.json();}).then(function(d){
    render((d.posts||[]).map(function(p){return {title:p.title,summary:p.summary,date:p.date,url:p.url,image:p.image,journal:p.journal};}));
  }).catch(function(){ render(FALLBACK); });
</script>
</body>
</html>
