<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>블로그 — 실험 펌프·제어·수리 인사이트 | 셀렙</title>
<meta name="description" content="연동·정량·시린지펌프 활용, 소프트웨어 제어, 수리·A/S, 논문 셋업 분석까지. 연구실에서 바로 쓰는 실험 펌프 인사이트.">
<link rel="canonical" href="https://cellab.kr/blog/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  .blog-main{ padding:30px 40px 80px; }
  .bwrap{ max-width:860px; margin:0 auto; }
  /* 히어로 프로모 */
  .b-promo{ display:flex; align-items:center; justify-content:space-between; gap:20px; background:linear-gradient(115deg,var(--green),var(--green-dk)); border-radius:20px; padding:34px 36px; color:#fff; overflow:hidden; }
  .b-promo .p-sub{ font-size:13px; font-weight:700; opacity:.85; margin-bottom:8px; }
  .b-promo h2{ font-family:var(--serif); font-size:25px; font-weight:700; letter-spacing:-.02em; line-height:1.34; color:#fff; }
  .b-promo .p-btn{ display:inline-block; margin-top:20px; background:#fff; color:var(--green); font-weight:800; font-size:14px; padding:11px 20px; border-radius:10px; }
  .b-promo .p-ill svg{ width:150px; height:120px; display:block; flex:0 0 auto; }
  /* 섹션 제목 */
  .b-sec-t{ font-family:var(--serif); font-size:22px; font-weight:700; letter-spacing:-.02em; margin:44px 0 20px; color:var(--ink); }
  /* 카테고리 타일 */
  .b-cats{ display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
  .b-cat .tile{ border-radius:16px; aspect-ratio:1/.72; display:flex; align-items:center; justify-content:center; transition:transform .15s; }
  .b-cat:hover .tile{ transform:translateY(-4px); }
  .b-cat .tile svg{ width:50px; height:50px; stroke:#fff; fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
  .b-cat.c1 .tile{ background:linear-gradient(135deg,#FF8A3D,#FF6B35); }
  .b-cat.c2 .tile{ background:linear-gradient(135deg,#4C8DFF,#3182F6); }
  .b-cat.c3 .tile{ background:linear-gradient(135deg,#9B6BFF,#7C4DFF); }
  .b-cat b{ display:block; font-size:15px; font-weight:700; margin-top:12px; color:var(--ink); }
  .b-cat span{ display:block; font-size:13px; color:var(--gray-2); margin-top:2px; }
  /* 아티클 리스트 */
  .b-art{ display:flex; gap:22px; padding:22px 0; border-bottom:1px solid var(--line); }
  .b-art:first-child{ padding-top:6px; }
  .b-art-img{ flex:0 0 168px; width:168px; height:108px; border-radius:12px; overflow:hidden; background:var(--soft); }
  .b-art-img img{ width:100%; height:100%; object-fit:cover; display:block; }
  .b-art-bd{ min-width:0; display:flex; flex-direction:column; justify-content:center; }
  .b-art-bd h3{ font-size:17px; font-weight:700; letter-spacing:-.01em; line-height:1.4; margin-bottom:7px; color:var(--ink); }
  .b-art:hover h3{ color:var(--green); }
  .b-art-bd p{ font-size:14px; color:var(--gray); line-height:1.55; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .b-art-meta{ font-size:12.5px; color:var(--gray-2); margin-top:9px; }
  @media(max-width:640px){
    .blog-main{ padding:24px 20px 60px; }
    .b-promo{ flex-direction:column; align-items:flex-start; padding:26px 24px; }
    .b-promo .p-ill{ display:none; }
    .b-cats{ grid-template-columns:1fr 1fr 1fr; gap:10px; }
    .b-cat .tile svg{ width:32px; height:32px; }
    .b-cat b{ font-size:13px; }.b-cat span{ display:none; }
    .b-art{ gap:14px; }
    .b-art-img{ flex-basis:110px; width:110px; height:74px; }
  }
</style>
<link rel="stylesheet" href="/assets/site.css">
</head>
<body>
<div id="cellab-header"></div>

<main class="blog-main">
  <div class="bwrap">
    <!-- 프로모 -->
    <a class="b-promo" href="/contact/#repair">
      <div class="p-tx">
        <div class="p-sub">Cellab A/S · 브랜드 무관</div>
        <h2>고장난 연동·정량·시린지펌프,<br>무료로 진단해 드립니다</h2>
        <span class="p-btn">무료 수리진단 신청 →</span>
      </div>
      <div class="p-ill" aria-hidden="true">
        <svg viewBox="0 0 150 120" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="14" width="138" height="92" rx="14" fill="rgba(255,255,255,.14)"/>
          <g transform="translate(30,34) scale(2.6)" fill="rgba(255,255,255,.9)"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></g>
        </svg>
      </div>
    </a>

    <!-- 카테고리 -->
    <h2 class="b-sec-t">가이드 A-Z</h2>
    <div class="b-cats">
      <a class="b-cat c1" href="/contact/#repair">
        <div class="tile"><svg viewBox="0 0 24 24"><path d="M14 7a4 4 0 0 1-5.5 3.7L4 15l-1 4 4-1 4.3-4.5A4 4 0 0 1 14 7z"/></svg></div>
        <b>수리·A/S</b><span>무료 진단·고장 해결</span>
      </a>
      <a class="b-cat c2" href="/application/">
        <div class="tile"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v3M12 18v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M3 12h3M18 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg></div>
        <b>펌프 활용</b><span>선택·튜브·셋업</span>
      </a>
      <a class="b-cat c3" href="/requests/">
        <div class="tile"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4M7 9l3 3-3 3M13 15h4"/></svg></div>
        <b>소프트웨어 제어</b><span>유량·시퀀스·모니터링</span>
      </a>
    </div>

    <!-- 최신 아티클 -->
    <h2 class="b-sec-t">최신 아티클</h2>
    <div id="artList"></div>
  </div>
</main>

<div id="cellab-footer"></div>
<script src="/assets/site.js" defer></script>
<script>
  var FALLBACK = [
    {title:"관류 배양을 논문처럼 재현하려면 펌프 제어를 어떻게 해야 하나 — bIUreactor(Butch 2024) 분석", summary:"오픈소스 3D 조직 플랫폼 bIUreactor는 연동펌프로 산소화 관류를 구현합니다. 다채널 독립 유량·장시간 무인 안정성·유량 프로파일 재현에서 확장 병목이 생깁니다.", date:"2026-07-02", url:"/blog/biureactor-perfusion.html", image:"/img/og-cover.png", journal:"Annals of Biomedical Engineering"},
    {title:"농축 태양광 하 droplet 증발 데이터가 흔들린다면 — 펌프 + 저울 피드백 조합이 답", summary:"솔라 스팀·광열 변환 실험에서 droplet 공급이 흔들리면 펌프 선택이 원인입니다. BT101 + 전자저울 피드백 셋업의 3가지 디테일.", date:"2026-05-08", url:"/blog/bt101-solar-droplet-feedback.html", image:"/blog/img/bt101-solar-droplet-feedback.svg", journal:"Advanced Science"},
    {title:"ex vivo 카테터 시험 데이터가 매번 흔들린다면 — 회로 설계가 답일 수 있습니다", summary:"같은 코팅인데 ex vivo 결과가 재현 안 되거나 누적 데이터를 못 뽑고 계시다면, 회로 설계가 원인입니다. BT101 셋업의 3가지 디테일.", date:"2026-05-07", url:"/blog/bt101-ex-vivo-catheter.html", image:"/blog/img/bt101-ex-vivo-catheter.svg", journal:"Nature Communications"}
  ];
  function render(posts){
    posts.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
    document.getElementById('artList').innerHTML = posts.map(function(p){
      var img = p.image || '/img/og-cover.png';
      var meta = [p.date, p.journal].filter(Boolean).join(' · ');
      return '<a class="b-art" href="'+p.url+'">'+
        '<div class="b-art-img"><img src="'+img+'" alt="" loading="lazy" onerror="this.style.display=\'none\'"></div>'+
        '<div class="b-art-bd"><h3>'+p.title+'</h3><p>'+(p.summary||'')+'</p><div class="b-art-meta">'+meta+'</div></div>'+
      '</a>';
    }).join('');
  }
  fetch('/_build/posts.json').then(function(r){return r.json();}).then(function(d){
    render((d.posts||[]).map(function(p){return {title:p.title,summary:p.summary,date:p.date,url:p.url,image:p.image,journal:p.journal};}));
  }).catch(function(){ render(FALLBACK); });
</script>
</body>
</html>
