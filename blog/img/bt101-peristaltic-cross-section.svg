<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Peristaltic pump cross-section — pump body separated from fluid path">
  <defs>
    <linearGradient id="bg-cs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f8f7"/>
    </linearGradient>
    <linearGradient id="pump-cs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0a2540"/>
    </linearGradient>
    <linearGradient id="roller-cs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a9b8cc"/>
      <stop offset="100%" stop-color="#5a6779"/>
    </linearGradient>
    <linearGradient id="tube-cs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#27a87f"/>
      <stop offset="100%" stop-color="#1a6e56"/>
    </linearGradient>
    <linearGradient id="fluid-cs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cce7fa"/>
      <stop offset="100%" stop-color="#7fb5e0"/>
    </linearGradient>
    <filter id="soft-cs" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="3" result="offset"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-cs" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a6e56"/>
    </marker>
  </defs>

  <rect width="1200" height="500" fill="url(#bg-cs)"/>

  <!-- 타이틀 -->
  <text x="60" y="55" font-family="-apple-system,'Apple SD Gothic Neo','Pretendard',sans-serif" font-size="12" font-weight="700" fill="#1a6e56" letter-spacing="3">CROSS-SECTION · 단면도</text>
  <text x="60" y="92" font-family="-apple-system,sans-serif" font-size="24" font-weight="800" fill="#0a2540" letter-spacing="-0.3">페리스탈틱 펌프 — 본체와 유체가 만나지 않는다</text>
  <text x="60" y="115" font-family="-apple-system,sans-serif" font-size="13" fill="#5a6779">롤러가 튜브 외부만 압축. 펌프 내부와 유체는 물리적으로 분리.</text>

  <!-- 좌측: 시린지/모터 펌프 (비교 — 유체와 접촉) -->
  <g transform="translate(120, 200)">
    <text x="150" y="-25" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" font-weight="700" fill="#c34a4a">기존 펌프 (시린지·모터)</text>

    <!-- 펌프 본체 -->
    <rect x="0" y="0" width="300" height="150" rx="10" fill="#f5e8e8" stroke="#c34a4a" stroke-width="2"/>

    <!-- 내부 플런저/임펠러 -->
    <rect x="40" y="50" width="220" height="50" rx="6" fill="#ffffff" stroke="#c34a4a" stroke-width="1.5"/>
    <!-- 유체 (펌프 내부에 직접 있음 — 빨간 표시) -->
    <rect x="48" y="58" width="204" height="34" rx="4" fill="url(#fluid-cs)" opacity="0.85"/>
    <!-- 플런저 -->
    <rect x="40" y="58" width="20" height="34" fill="#c34a4a"/>
    <line x1="50" y1="50" x2="50" y2="100" stroke="#a03030" stroke-width="2"/>

    <!-- 화살표 (유체가 내부와 접촉) -->
    <path d="M 100 130 L 100 110" stroke="#c34a4a" stroke-width="2" fill="none" marker-end="url(#arrow-cs)" opacity="0.6"/>

    <!-- X 표시 -->
    <g transform="translate(280, -10)">
      <circle cx="0" cy="0" r="18" fill="#c34a4a"/>
      <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="800" fill="#ffffff">✕</text>
    </g>

    <!-- 캡션 -->
    <text x="150" y="180" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" font-weight="700" fill="#c34a4a">유체가 펌프 내부와 직접 접촉</text>
    <text x="150" y="200" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="#5a6779">→ 균·단백질 오염 위험</text>
  </g>


  <!-- 중앙 구분선 -->
  <line x1="600" y1="170" x2="600" y2="420" stroke="#e3e8ef" stroke-width="2" stroke-dasharray="6,4"/>
  <g transform="translate(600, 290)">
    <circle cx="0" cy="0" r="24" fill="#ffffff" stroke="#e3e8ef" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" font-weight="700" fill="#5a6779">VS</text>
  </g>


  <!-- 우측: 페리스탈틱 펌프 단면도 -->
  <g transform="translate(680, 200)">
    <text x="200" y="-25" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" font-weight="700" fill="#1a6e56">페리스탈틱 펌프 (BT101)</text>

    <!-- 펌프 본체 외곽 -->
    <g filter="url(#soft-cs)">
      <rect x="0" y="0" width="400" height="200" rx="10" fill="url(#pump-cs)"/>
    </g>

    <!-- 펌프 헤드 원 (큰 원) -->
    <circle cx="200" cy="100" r="80" fill="#ffffff"/>
    <circle cx="200" cy="100" r="80" fill="none" stroke="#a9b8cc" stroke-width="2"/>

    <!-- 외부 튜브 라인 (원형) -->
    <circle cx="200" cy="100" r="58" fill="none" stroke="url(#tube-cs)" stroke-width="14"/>

    <!-- 튜브 내부 (유체) -->
    <circle cx="200" cy="100" r="48" fill="none" stroke="url(#fluid-cs)" stroke-width="4"/>

    <!-- 롤러 3개 (120도 간격, 튜브 외부에서 압착) -->
    <g>
      <!-- 롤러 1 (위) - 압착 위치 -->
      <circle cx="200" cy="42" r="14" fill="url(#roller-cs)" stroke="#0a2540" stroke-width="1.5"/>
      <!-- 압착 표시 (튜브 눌림) -->
      <path d="M 188 56 Q 200 60 212 56" stroke="#fff" stroke-width="3" fill="none"/>

      <!-- 롤러 2 (우하) -->
      <circle cx="250" cy="129" r="14" fill="url(#roller-cs)" stroke="#0a2540" stroke-width="1.5"/>

      <!-- 롤러 3 (좌하) -->
      <circle cx="150" cy="129" r="14" fill="url(#roller-cs)" stroke="#0a2540" stroke-width="1.5"/>
    </g>

    <!-- 중심축 -->
    <circle cx="200" cy="100" r="8" fill="#5a6779"/>
    <circle cx="200" cy="100" r="3" fill="#ffffff"/>

    <!-- 회전 화살표 -->
    <path d="M 245 60 A 60 60 0 0 1 260 95" fill="none" stroke="#a7e8c3" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow-cs)"/>

    <!-- 라벨 (튜브) -->
    <line x1="320" y1="60" x2="265" y2="80" stroke="#5a6779" stroke-width="1"/>
    <text x="325" y="63" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#1a6e56">실리콘 튜브</text>
    <text x="325" y="79" font-family="-apple-system,sans-serif" font-size="10" fill="#5a6779">(유체 경로)</text>

    <!-- 라벨 (롤러) -->
    <line x1="200" y1="20" x2="200" y2="35" stroke="#5a6779" stroke-width="1"/>
    <text x="200" y="14" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#0a2540">롤러 압착</text>

    <!-- 체크 표시 -->
    <g transform="translate(380, -10)">
      <circle cx="0" cy="0" r="18" fill="#1a6e56"/>
      <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="800" fill="#ffffff">✓</text>
    </g>

    <!-- 캡션 -->
    <text x="200" y="230" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" font-weight="700" fill="#1a6e56">롤러가 튜브 외부만 압축</text>
    <text x="200" y="250" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="#5a6779">→ 펌프 내부와 유체 무접촉 · 무오염</text>
  </g>


  <!-- 하단 캡션 -->
  <g transform="translate(60, 470)">
    <text font-family="-apple-system,sans-serif" font-size="11" fill="#888">
      <tspan font-weight="700" fill="#1a6e56">핵심</tspan> · 균막·혈전 시험에서 펌프 자체가 오염원이 되면 안 됨 → 페리스탈틱이 정답
    </text>
  </g>

</svg>
