<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet" role="img" aria-label="BT101 solar droplet pump + balance feedback setup — modern infographic">
  <defs>
    <linearGradient id="bg-grad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f8f7"/>
    </linearGradient>
    <linearGradient id="pump-grad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0a2540"/>
    </linearGradient>
    <linearGradient id="saline-grad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cce7fa"/>
      <stop offset="100%" stop-color="#7fb5e0"/>
    </linearGradient>
    <linearGradient id="tube-grad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#27a87f"/>
      <stop offset="100%" stop-color="#1a6e56"/>
    </linearGradient>
    <radialGradient id="sun-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd87a"/>
      <stop offset="50%" stop-color="#ffb22e"/>
      <stop offset="100%" stop-color="#ff7a18"/>
    </radialGradient>
    <linearGradient id="surface-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>

    <filter id="soft-shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offset"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sun-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="arrow-green2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a6e56"/>
    </marker>
    <marker id="arrow-blue2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3a7bd5"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="url(#bg-grad2)"/>

  <!-- 배경 그리드 점 -->
  <g fill="#dee5ec" opacity="0.4">
    <circle cx="80" cy="80" r="1.8"/><circle cx="160" cy="80" r="1.8"/><circle cx="240" cy="80" r="1.8"/>
    <circle cx="1120" cy="80" r="1.8"/><circle cx="1040" cy="80" r="1.8"/><circle cx="960" cy="80" r="1.8"/>
    <circle cx="80" cy="620" r="1.8"/><circle cx="160" cy="620" r="1.8"/>
    <circle cx="1120" cy="620" r="1.8"/><circle cx="1040" cy="620" r="1.8"/>
  </g>

  <!-- 타이틀 -->
  <text x="60" y="65" font-family="-apple-system,'Apple SD Gothic Neo','Pretendard',sans-serif" font-size="13" font-weight="700" fill="#1a6e56" letter-spacing="3">CELLAB · PUMP SETUP</text>
  <text x="60" y="105" font-family="-apple-system,sans-serif" font-size="30" font-weight="800" fill="#0a2540" letter-spacing="-0.5">광열 변환 droplet 피드백 셋업</text>
  <text x="60" y="132" font-family="-apple-system,sans-serif" font-size="14" fill="#5a6779">Advanced Science · 2020 · 0.94 mg/cm²/s 안정 측정</text>

  <!-- 우상단 KEY RESULT -->
  <g transform="translate(960, 60)">
    <rect x="0" y="0" width="180" height="70" rx="8" fill="#0a2540"/>
    <text x="90" y="22" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#7fb5e0" letter-spacing="2">KEY RESULT</text>
    <text x="90" y="46" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ffffff">0.94 mg/cm²/s</text>
    <text x="90" y="62" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#a9b8cc">6 sun 농축광</text>
  </g>

  <!-- ===== 6 sun 광원 (상단) ===== -->
  <g transform="translate(540, 220)" filter="url(#sun-glow)">
    <circle cx="60" cy="0" r="36" fill="url(#sun-grad)"/>
    <g stroke="#ff9d3a" stroke-width="3" stroke-linecap="round" opacity="0.7">
      <line x1="60" y1="-50" x2="60" y2="-65"/>
      <line x1="20" y1="-30" x2="9" y2="-45"/>
      <line x1="100" y1="-30" x2="111" y2="-45"/>
      <line x1="0" y1="0" x2="-18" y2="0"/>
      <line x1="120" y1="0" x2="138" y2="0"/>
    </g>
  </g>

  <!-- 광 빔 (태양 → SSA 표면) -->
  <g opacity="0.4">
    <path d="M 600 265 L 540 470" stroke="url(#sun-grad)" stroke-width="50" stroke-linecap="round"/>
    <path d="M 600 265 L 660 470" stroke="url(#sun-grad)" stroke-width="50" stroke-linecap="round"/>
  </g>

  <!-- 6 sun 라벨 -->
  <g transform="translate(540, 195)">
    <rect x="0" y="0" width="120" height="24" rx="12" fill="#ff7a18"/>
    <text x="60" y="16" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" font-weight="800" fill="#ffffff" letter-spacing="1.5">6 SUN 농축</text>
  </g>

  <!-- ===== Reservoir (1) — 좌측 ===== -->
  <g transform="translate(110, 340)" filter="url(#soft-shadow2)">
    <path d="M5,0 L5,110 Q5,128 23,128 L105,128 Q123,128 123,110 L123,0 Z" fill="#ffffff" stroke="#0a2540" stroke-width="2.5"/>
    <rect x="0" y="-5" width="128" height="10" rx="2" fill="#0a2540"/>
    <path d="M10,45 Q10,128 33,128 L95,128 Q118,128 118,45 Z" fill="url(#saline-grad2)" opacity="0.85"/>
    <path d="M10,45 Q33,38 64,45 T118,45" stroke="#a7d3f5" stroke-width="2" fill="none"/>
  </g>

  <g transform="translate(110, 340)">
    <circle cx="-30" cy="-5" r="22" fill="#1a6e56"/>
    <text x="-30" y="3" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="20" font-weight="800" fill="#ffffff">1</text>
    <text x="64" y="-30" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="17" font-weight="800" fill="#0a2540">Reservoir</text>
    <text x="64" y="160" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" fill="#5a6779">증류수</text>
  </g>


  <!-- ===== BT101 Pump (2) — 중앙 좌측 ===== -->
  <g transform="translate(290, 340)" filter="url(#soft-shadow2)">
    <rect x="0" y="0" width="180" height="150" rx="10" fill="url(#pump-grad2)"/>
    <rect x="14" y="14" width="152" height="32" rx="4" fill="#0a4d3a"/>
    <text x="90" y="36" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#5fe6a8" letter-spacing="1">PULSE MODE</text>
    <circle cx="90" cy="100" r="40" fill="#ffffff"/>
    <circle cx="90" cy="100" r="40" fill="none" stroke="#1a6e56" stroke-width="3"/>
    <circle cx="90" cy="100" r="28" fill="none" stroke="#7fb5e0" stroke-width="3" opacity="0.6"/>
    <circle cx="90" cy="72" r="8" fill="url(#tube-grad2)"/>
    <circle cx="116" cy="115" r="8" fill="url(#tube-grad2)"/>
    <circle cx="64" cy="115" r="8" fill="url(#tube-grad2)"/>
  </g>

  <g transform="translate(290, 340)">
    <circle cx="-30" cy="-5" r="22" fill="#1a6e56"/>
    <text x="-30" y="3" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="20" font-weight="800" fill="#ffffff">2</text>
    <text x="90" y="-30" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="17" font-weight="800" fill="#0a2540">BT101 + YZ15</text>
    <text x="90" y="180" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" fill="#5a6779">디지털 분주 · 펄스 모드</text>
  </g>


  <!-- ===== Droplet 노즐 (중앙) ===== -->
  <g transform="translate(560, 360)" filter="url(#soft-shadow2)">
    <rect x="35" y="0" width="20" height="60" rx="3" fill="#0a2540"/>
    <path d="M35,60 L35,80 L55,80 L55,60 Z" fill="#0a2540"/>
    <ellipse cx="45" cy="92" rx="6" ry="8" fill="url(#saline-grad2)"/>
    <circle cx="45" cy="115" r="4" fill="url(#saline-grad2)" opacity="0.8"/>
    <circle cx="40" cy="135" r="3" fill="url(#saline-grad2)" opacity="0.6"/>
    <circle cx="50" cy="148" r="3.5" fill="url(#saline-grad2)" opacity="0.5"/>
  </g>

  <text x="605" y="345" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" font-weight="700" fill="#0a2540">Droplet 노즐</text>


  <!-- ===== rGO-SSA 표면 (3) — 중앙 하단 ===== -->
  <g transform="translate(490, 510)" filter="url(#soft-shadow2)">
    <rect x="0" y="0" width="240" height="42" rx="6" fill="url(#surface-grad)"/>
    <g fill="#555">
      <circle cx="20" cy="14" r="1.5"/><circle cx="50" cy="22" r="1.5"/><circle cx="80" cy="14" r="1.5"/>
      <circle cx="110" cy="24" r="1.5"/><circle cx="140" cy="16" r="1.5"/><circle cx="170" cy="22" r="1.5"/>
      <circle cx="200" cy="16" r="1.5"/><circle cx="220" cy="22" r="1.5"/>
    </g>
    <g stroke="#a7d3f5" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round">
      <path d="M50,-5 Q55,-15 50,-25 Q45,-35 50,-45"/>
      <path d="M120,-5 Q125,-15 120,-25 Q115,-35 120,-45"/>
      <path d="M190,-5 Q195,-15 190,-25 Q185,-35 190,-45"/>
    </g>
  </g>

  <g transform="translate(490, 510)">
    <circle cx="-30" cy="20" r="22" fill="#1a6e56"/>
    <text x="-30" y="28" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="20" font-weight="800" fill="#ffffff">3</text>
    <text x="120" y="78" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="17" font-weight="800" fill="#0a2540">rGO-SSA 흡수체</text>
    <text x="120" y="98" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" fill="#5a6779">α≈0.92 · ε≈0.04</text>
  </g>


  <!-- ===== 전자저울 (4) — 우측 ===== -->
  <g transform="translate(830, 470)" filter="url(#soft-shadow2)">
    <rect x="0" y="40" width="200" height="80" rx="8" fill="#ffffff" stroke="#0a2540" stroke-width="2.5"/>
    <rect x="20" y="55" width="160" height="40" rx="4" fill="#1a1a1a"/>
    <text x="100" y="82" text-anchor="middle" font-family="monospace" font-size="22" font-weight="700" fill="#5fe6a8" letter-spacing="2">0.94 mg</text>
    <rect x="50" y="20" width="100" height="20" rx="3" fill="#dde6ee"/>
    <rect x="60" y="0" width="80" height="22" rx="2" fill="#e8ecf2" stroke="#aab5c2" stroke-width="1"/>
  </g>

  <g transform="translate(830, 470)">
    <circle cx="-30" cy="80" r="22" fill="#1a6e56"/>
    <text x="-30" y="88" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="20" font-weight="800" fill="#ffffff">4</text>
    <text x="100" y="-15" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="17" font-weight="800" fill="#0a2540">ME104E 전자저울</text>
    <text x="100" y="145" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" fill="#5a6779">0.1mg 분해능 · METTLER TOLEDO</text>
  </g>


  <!-- ===== 튜브 연결 (1 → 2) ===== -->
  <path d="M 245 425 Q 270 425 290 405" fill="none" stroke="url(#tube-grad2)" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow-green2)"/>

  <!-- ===== 튜브 (2 → 노즐) ===== -->
  <path d="M 470 405 Q 530 405 590 370" fill="none" stroke="url(#tube-grad2)" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow-green2)"/>

  <!-- ===== 피드백 라인 (저울 → 펌프) ===== -->
  <path d="M 830 530 Q 700 620 460 580 Q 410 565 380 510"
        fill="none" stroke="#3a7bd5" stroke-width="4" stroke-dasharray="6,5" stroke-linecap="round" marker-end="url(#arrow-blue2)"/>

  <!-- FEEDBACK 라벨 -->
  <g transform="translate(580, 622)">
    <rect x="0" y="0" width="240" height="36" rx="18" fill="#3a7bd5"/>
    <text x="120" y="24" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" font-weight="800" fill="#ffffff" letter-spacing="1.5">CLOSED-LOOP FEEDBACK</text>
  </g>

  <!-- 좌하단 캡션 -->
  <g transform="translate(60, 678)">
    <text font-family="-apple-system,sans-serif" font-size="11" fill="#888">
      <tspan font-weight="700" fill="#1a6e56">디테일</tspan> · 미세 유량 안정 · 저울 피드백 closed-loop · 펄스 모드 boiling 동역학
    </text>
  </g>

</svg>
