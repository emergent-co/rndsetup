<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Pump + balance closed-loop feedback cycle">
  <defs>
    <linearGradient id="bg-fb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f8f7"/>
    </linearGradient>
    <linearGradient id="pump-fb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0a2540"/>
    </linearGradient>
    <linearGradient id="tube-fb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#27a87f"/>
      <stop offset="100%" stop-color="#1a6e56"/>
    </linearGradient>
    <linearGradient id="fluid-fb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cce7fa"/>
      <stop offset="100%" stop-color="#7fb5e0"/>
    </linearGradient>
    <filter id="soft-fb" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="3" result="offset"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-green-fb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a6e56"/>
    </marker>
    <marker id="arrow-blue-fb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3a7bd5"/>
    </marker>
  </defs>

  <rect width="1200" height="500" fill="url(#bg-fb)"/>

  <!-- 타이틀 -->
  <text x="60" y="55" font-family="-apple-system,'Apple SD Gothic Neo','Pretendard',sans-serif" font-size="12" font-weight="700" fill="#1a6e56" letter-spacing="3">CLOSED-LOOP FEEDBACK · 피드백 사이클</text>
  <text x="60" y="92" font-family="-apple-system,sans-serif" font-size="24" font-weight="800" fill="#0a2540" letter-spacing="-0.3">"실측 mass"가 다음 droplet 공급을 결정한다</text>
  <text x="60" y="115" font-family="-apple-system,sans-serif" font-size="13" fill="#5a6779">펌프 단독 = 설정 RPM. 저울 피드백 = 실측 mass 기반 자동 보정.</text>


  <!-- ===== ① 펌프 (좌측) ===== -->
  <g transform="translate(120, 220)" filter="url(#soft-fb)">
    <rect x="0" y="0" width="160" height="140" rx="10" fill="url(#pump-fb)"/>
    <rect x="14" y="14" width="132" height="28" rx="4" fill="#0a4d3a"/>
    <text x="80" y="33" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#5fe6a8" letter-spacing="1">PULSE MODE</text>
    <circle cx="80" cy="92" r="34" fill="#ffffff"/>
    <circle cx="80" cy="92" r="34" fill="none" stroke="#1a6e56" stroke-width="2.5"/>
    <circle cx="80" cy="68" r="7" fill="url(#tube-fb)"/>
    <circle cx="102" cy="105" r="7" fill="url(#tube-fb)"/>
    <circle cx="58" cy="105" r="7" fill="url(#tube-fb)"/>
  </g>
  <g transform="translate(120, 220)">
    <!-- 번호 ① -->
    <circle cx="-30" cy="-5" r="20" fill="#1a6e56"/>
    <text x="-30" y="2" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="18" font-weight="800" fill="#ffffff">1</text>
    <text x="80" y="-25" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="15" font-weight="800" fill="#0a2540">BT101 펌프 토출</text>
    <text x="80" y="165" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="#5a6779">디지털 분주 모드</text>
  </g>


  <!-- ===== ② Droplet 노즐 + droplet (중앙 좌) ===== -->
  <g transform="translate(380, 220)">
    <rect x="40" y="0" width="14" height="50" rx="2" fill="#0a2540"/>
    <path d="M40,50 L40,65 L54,65 L54,50 Z" fill="#0a2540"/>
    <ellipse cx="47" cy="75" rx="5" ry="7" fill="url(#fluid-fb)"/>
    <circle cx="47" cy="95" r="4" fill="url(#fluid-fb)" opacity="0.8"/>
    <circle cx="44" cy="115" r="3.5" fill="url(#fluid-fb)" opacity="0.6"/>
    <circle cx="50" cy="132" r="4" fill="url(#fluid-fb)" opacity="0.5"/>
  </g>
  <g transform="translate(380, 220)">
    <!-- 번호 ② -->
    <circle cx="-15" cy="-5" r="20" fill="#1a6e56"/>
    <text x="-15" y="2" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="18" font-weight="800" fill="#ffffff">2</text>
    <text x="47" y="-25" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="15" font-weight="800" fill="#0a2540">Droplet 형성</text>
    <text x="47" y="165" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="#5a6779">~5–20 mg/방울</text>
  </g>


  <!-- ===== ③ 저울 (중앙 우) ===== -->
  <g transform="translate(620, 230)" filter="url(#soft-fb)">
    <rect x="0" y="30" width="200" height="80" rx="8" fill="#ffffff" stroke="#0a2540" stroke-width="2.5"/>
    <rect x="20" y="42" width="160" height="40" rx="4" fill="#1a1a1a"/>
    <text x="100" y="69" text-anchor="middle" font-family="monospace" font-size="22" font-weight="700" fill="#5fe6a8" letter-spacing="2">0.94 mg</text>
    <rect x="50" y="10" width="100" height="20" rx="3" fill="#dde6ee"/>
    <rect x="60" y="-10" width="80" height="22" rx="2" fill="#e8ecf2" stroke="#aab5c2" stroke-width="1"/>
    <!-- droplet 떨어진 표시 -->
    <ellipse cx="100" cy="-3" rx="4" ry="5" fill="url(#fluid-fb)" opacity="0.7"/>
  </g>
  <g transform="translate(620, 230)">
    <!-- 번호 ③ -->
    <circle cx="-30" cy="65" r="20" fill="#1a6e56"/>
    <text x="-30" y="72" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="18" font-weight="800" fill="#ffffff">3</text>
    <text x="100" y="-30" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="15" font-weight="800" fill="#0a2540">전자저울 측정</text>
    <text x="100" y="135" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="#5a6779">METTLER ME104E · 0.1mg</text>
  </g>


  <!-- ===== ④ 피드백 → 펌프 (우측 카드) ===== -->
  <g transform="translate(900, 220)" filter="url(#soft-fb)">
    <rect x="0" y="0" width="200" height="140" rx="10" fill="#ffffff" stroke="#3a7bd5" stroke-width="2"/>
    <rect x="0" y="0" width="200" height="38" rx="10" fill="#3a7bd5"/>
    <rect x="0" y="28" width="200" height="10" fill="#3a7bd5"/>
    <text x="100" y="25" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" font-weight="800" fill="#ffffff" letter-spacing="1.5">CONTROLLER</text>
    <!-- 신호 그래프 -->
    <polyline points="20,90 40,75 60,82 80,68 100,72 120,60 140,65 160,55 180,60" fill="none" stroke="#3a7bd5" stroke-width="2.5"/>
    <!-- 가로 라인 -->
    <line x1="20" y1="105" x2="180" y2="105" stroke="#aab5c2" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="100" y="125" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#5a6779">feeding rate 자동 조정</text>
  </g>
  <g transform="translate(900, 220)">
    <!-- 번호 ④ -->
    <circle cx="-15" cy="-5" r="20" fill="#3a7bd5"/>
    <text x="-15" y="2" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="18" font-weight="800" fill="#ffffff">4</text>
    <text x="100" y="-25" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="15" font-weight="800" fill="#0a2540">피드백 · 펌프 보정</text>
    <text x="100" y="165" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="#5a6779">RS232 · PLC/PC</text>
  </g>


  <!-- 화살표 ① → ② -->
  <path d="M 285 290 Q 330 290 380 290" fill="none" stroke="url(#tube-fb)" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow-green-fb)"/>

  <!-- 화살표 ② → ③ (떨어지는 화살표) -->
  <path d="M 435 380 Q 530 410 620 360" fill="none" stroke="url(#fluid-fb)" stroke-width="4" stroke-linecap="round" stroke-dasharray="4,4"/>
  <path d="M 600 365 L 620 360" stroke="#7fb5e0" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-green-fb)"/>

  <!-- 화살표 ③ → ④ -->
  <path d="M 820 290 Q 870 290 900 290" fill="none" stroke="#3a7bd5" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue-fb)"/>

  <!-- 피드백 회귀 ④ → ① (큰 곡선) -->
  <path d="M 1000 360 Q 1080 440 800 460 Q 400 480 180 430 Q 100 400 130 360"
        fill="none" stroke="#3a7bd5" stroke-width="3" stroke-dasharray="6,5" stroke-linecap="round" marker-end="url(#arrow-blue-fb)"/>

  <!-- 피드백 라벨 -->
  <g transform="translate(490, 442)">
    <rect x="0" y="0" width="220" height="32" rx="16" fill="#3a7bd5"/>
    <text x="110" y="22" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" font-weight="800" fill="#ffffff" letter-spacing="1.5">FEEDBACK LOOP</text>
  </g>

</svg>
