<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet" role="img" aria-label="BT101 ex vivo catheter closed-loop setup — modern infographic">
  <defs>
    <!-- 배경 그라디언트 -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f8f7"/>
    </linearGradient>

    <!-- 펌프 본체 그라디언트 -->
    <linearGradient id="pump-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0a2540"/>
    </linearGradient>

    <!-- 유체 그라디언트 -->
    <linearGradient id="saline-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cce7fa"/>
      <stop offset="100%" stop-color="#7fb5e0"/>
    </linearGradient>

    <!-- 튜브 그린 그라디언트 -->
    <linearGradient id="tube-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#27a87f"/>
      <stop offset="100%" stop-color="#1a6e56"/>
    </linearGradient>

    <!-- 부드러운 그림자 -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offset"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- 화살표 마커 -->
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a6e56"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="700" fill="url(#bg-grad)"/>

  <!-- 배경 그리드 점 패턴 -->
  <g fill="#dee5ec" opacity="0.4">
    <circle cx="80" cy="80" r="1.8"/><circle cx="160" cy="80" r="1.8"/><circle cx="240" cy="80" r="1.8"/>
    <circle cx="1120" cy="80" r="1.8"/><circle cx="1040" cy="80" r="1.8"/><circle cx="960" cy="80" r="1.8"/>
    <circle cx="80" cy="620" r="1.8"/><circle cx="160" cy="620" r="1.8"/>
    <circle cx="1120" cy="620" r="1.8"/><circle cx="1040" cy="620" r="1.8"/>
  </g>

  <!-- 타이틀 영역 -->
  <text x="60" y="65" font-family="-apple-system,'Apple SD Gothic Neo','Pretendard',sans-serif" font-size="13" font-weight="700" fill="#1a6e56" letter-spacing="3">CELLAB · PUMP SETUP</text>
  <text x="60" y="105" font-family="-apple-system,'Apple SD Gothic Neo','Pretendard',sans-serif" font-size="30" font-weight="800" fill="#0a2540" letter-spacing="-0.5">ex vivo 카테터 폐쇄 회로</text>
  <text x="60" y="132" font-family="-apple-system,'Apple SD Gothic Neo','Pretendard',sans-serif" font-size="14" fill="#5a6779">Nature Communications · 2024 · 28일 안정 데이터</text>

  <!-- 우상단 메타 -->
  <g transform="translate(960, 60)">
    <rect x="0" y="0" width="180" height="70" rx="8" fill="#0a2540"/>
    <text x="90" y="22" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#7fb5e0" letter-spacing="2">KEY SPEC</text>
    <text x="90" y="46" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ffffff">38.4 mL/min</text>
    <text x="90" y="62" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#a9b8cc">실리콘 ID 3.0mm</text>
  </g>

  <!-- ===== Reservoir (1) ===== -->
  <g transform="translate(120, 260)" filter="url(#soft-shadow)">
    <!-- 비커 본체 -->
    <path d="M5,0 L5,120 Q5,140 25,140 L115,140 Q135,140 135,120 L135,0 Z" fill="#ffffff" stroke="#0a2540" stroke-width="2.5"/>
    <!-- 비커 입구 -->
    <rect x="0" y="-5" width="140" height="10" rx="2" fill="#0a2540"/>
    <!-- Saline (그라디언트) -->
    <path d="M10,50 Q10,140 35,140 L105,140 Q130,140 130,50 Z" fill="url(#saline-grad)" opacity="0.85"/>
    <!-- 수면 파동 -->
    <path d="M10,50 Q35,42 70,50 T130,50" stroke="#a7d3f5" stroke-width="2" fill="none"/>
    <!-- 측정 눈금 -->
    <line x1="125" y1="60" x2="135" y2="60" stroke="#0a2540" stroke-width="1"/>
    <line x1="125" y1="80" x2="135" y2="80" stroke="#0a2540" stroke-width="1"/>
    <line x1="125" y1="100" x2="135" y2="100" stroke="#0a2540" stroke-width="1"/>
    <text x="125" y="64" text-anchor="end" font-family="sans-serif" font-size="9" fill="#0a2540">100</text>
    <text x="125" y="84" text-anchor="end" font-family="sans-serif" font-size="9" fill="#0a2540">50</text>
  </g>

  <!-- Reservoir 라벨 -->
  <g transform="translate(120, 260)">
    <circle cx="-30" cy="-5" r="22" fill="#1a6e56"/>
    <text x="-30" y="3" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="20" font-weight="800" fill="#ffffff">1</text>
    <text x="70" y="-30" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="17" font-weight="800" fill="#0a2540">Reservoir</text>
    <text x="70" y="170" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" fill="#5a6779">USP-grade Saline</text>
  </g>


  <!-- ===== BT101 Pump (2) ===== -->
  <g transform="translate(490, 240)" filter="url(#soft-shadow)">
    <!-- 펌프 본체 -->
    <rect x="0" y="0" width="220" height="180" rx="10" fill="url(#pump-grad)"/>
    <!-- 화면 패널 -->
    <rect x="20" y="20" width="180" height="36" rx="4" fill="#0a4d3a"/>
    <text x="110" y="44" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#5fe6a8" letter-spacing="1">38.4 mL/min</text>
    <!-- 펌프 헤드 (큰 원) -->
    <circle cx="110" cy="115" r="48" fill="#ffffff"/>
    <circle cx="110" cy="115" r="48" fill="none" stroke="#1a6e56" stroke-width="3"/>
    <!-- 내부 튜브 라인 -->
    <circle cx="110" cy="115" r="34" fill="none" stroke="#7fb5e0" stroke-width="3" opacity="0.6"/>
    <!-- 롤러 3개 (120도 간격) -->
    <circle cx="110" cy="80" r="9" fill="url(#tube-grad)"/>
    <circle cx="140" cy="132" r="9" fill="url(#tube-grad)"/>
    <circle cx="80" cy="132" r="9" fill="url(#tube-grad)"/>
    <!-- 회전 화살표 -->
    <path d="M140,98 A30,30 0 0,1 145,118" stroke="#a7e8c3" stroke-width="2" fill="none" stroke-linecap="round" marker-end="url(#arrow-green)"/>
  </g>

  <!-- 펌프 라벨 -->
  <g transform="translate(490, 240)">
    <circle cx="-30" cy="-5" r="22" fill="#1a6e56"/>
    <text x="-30" y="3" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="20" font-weight="800" fill="#ffffff">2</text>
    <text x="110" y="-30" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="17" font-weight="800" fill="#0a2540">BT101 + YZ15</text>
    <text x="110" y="210" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" fill="#5a6779">페리스탈틱 · 펌프 비접촉</text>
  </g>


  <!-- ===== Catheter (3) ===== -->
  <g transform="translate(900, 260)" filter="url(#soft-shadow)">
    <!-- 카테터 챔버 -->
    <rect x="0" y="0" width="160" height="140" rx="10" fill="#ffffff" stroke="#0a2540" stroke-width="2.5"/>
    <!-- 카테터 절편 -->
    <rect x="20" y="45" width="120" height="22" rx="11" fill="url(#tube-grad)"/>
    <!-- 코팅 표시 (내부 라이트 컬러) -->
    <rect x="24" y="49" width="112" height="14" rx="7" fill="#dff0e7"/>
    <!-- 5cm 라벨 -->
    <line x1="20" y1="78" x2="140" y2="78" stroke="#0a2540" stroke-width="1"/>
    <text x="80" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#0a2540">5 cm</text>
    <!-- 유체 파티클 -->
    <circle cx="35" cy="115" r="3" fill="#7fb5e0" opacity="0.7"/>
    <circle cx="65" cy="120" r="2.5" fill="#7fb5e0" opacity="0.7"/>
    <circle cx="95" cy="112" r="2" fill="#7fb5e0" opacity="0.7"/>
    <circle cx="125" cy="118" r="3" fill="#7fb5e0" opacity="0.7"/>
  </g>

  <!-- 카테터 라벨 -->
  <g transform="translate(900, 260)">
    <circle cx="-30" cy="-5" r="22" fill="#1a6e56"/>
    <text x="-30" y="3" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="20" font-weight="800" fill="#ffffff">3</text>
    <text x="80" y="-30" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="17" font-weight="800" fill="#0a2540">Catheter 5cm</text>
    <text x="80" y="170" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" fill="#5a6779">Heparin coating · 항혈전</text>
  </g>


  <!-- ===== 튜브 연결 (1 → 2) ===== -->
  <path d="M 260 320 Q 380 320 490 320" fill="none" stroke="url(#tube-grad)" stroke-width="10" stroke-linecap="round" marker-end="url(#arrow-green)"/>
  <rect x="350" y="285" width="60" height="22" rx="11" fill="#ffffff" stroke="#1a6e56" stroke-width="1.5"/>
  <text x="380" y="300" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#1a6e56">ID 3.0mm</text>

  <!-- ===== 튜브 연결 (2 → 3) ===== -->
  <path d="M 710 320 Q 810 320 900 320" fill="none" stroke="url(#tube-grad)" stroke-width="10" stroke-linecap="round" marker-end="url(#arrow-green)"/>
  <rect x="775" y="285" width="60" height="22" rx="11" fill="#ffffff" stroke="#1a6e56" stroke-width="1.5"/>
  <text x="805" y="300" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#1a6e56">ID 3.0mm</text>


  <!-- ===== 폐쇄 회로 (3 → 1) ===== -->
  <path d="M 1060 400 Q 1140 460 1080 530 Q 950 600 600 590 Q 250 580 130 510 Q 70 460 130 400"
        fill="none" stroke="url(#tube-grad)" stroke-width="10" stroke-linecap="round"
        stroke-dasharray="0" marker-end="url(#arrow-green)" opacity="0.85"/>

  <!-- CLOSED LOOP 라벨 (중앙 하단) -->
  <g transform="translate(490, 605)">
    <rect x="0" y="0" width="220" height="42" rx="21" fill="#1a6e56"/>
    <text x="110" y="27" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="2">CLOSED LOOP · 폐쇄 회로</text>
  </g>


  <!-- 좌하단 캡션 -->
  <g transform="translate(60, 660)">
    <text font-family="-apple-system,sans-serif" font-size="11" fill="#888">
      <tspan font-weight="700" fill="#1a6e56">디테일</tspan> · 펌프 내부 비접촉 · 회로 손실 0 · 정맥 유속·전단 응력 모방
    </text>
  </g>

</svg>
