<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --navy:#0a2540;--teal:#1a6e56;--text:#1a2332;--muted:#5a6779;--border:#e3e8ef;--bg:#f7f9fc;
  }
  html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:var(--text);background:var(--bg);line-height:1.55}
  a{color:var(--teal);text-decoration:none}
  .container{max-width:720px;margin:0 auto;padding:32px 20px}

  .head{padding:18px 0;border-bottom:1px solid var(--border);margin-bottom:24px}
  .head a{font-size:21px;font-weight:800;color:var(--navy);letter-spacing:-.02em}
  .head a span{color:var(--teal)}
  .head .sub{font-size:12px;color:var(--muted);margin-top:2px}

  .progress{display:flex;gap:8px;margin-bottom:20px;font-size:12px;color:var(--muted)}
  .progress .step{padding:6px 12px;border-radius:14px;background:#fff;border:1px solid var(--border)}
  .progress .step.active{background:var(--teal);color:#fff;border-color:var(--teal);font-weight:700}

  h1{font-size:24px;font-weight:800;color:var(--navy);letter-spacing:-.02em;margin-bottom:8px}
  .lead{font-size:13px;color:var(--muted);margin-bottom:6px}
  .setup-title{font-size:14px;font-weight:700;color:var(--teal);margin-bottom:18px}

  .form{background:#fff;border:1px solid var(--border);border-radius:10px;padding:24px}

  /* 부품 리스트 */
  .item{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;transition:all .15s;background:#fff;cursor:pointer}
  .item:hover{border-color:var(--teal);background:#f5f9f7}
  .item input[type=checkbox]{width:18px;height:18px;accent-color:var(--teal);flex-shrink:0;cursor:pointer}
  .item .info{flex:1;min-width:0}
  .item .info .name{font-size:13.5px;font-weight:700;color:var(--text);margin-bottom:2px}
  .item .info .spec{font-size:11.5px;color:var(--muted);line-height:1.4}
  .item .info .market-row{margin-top:6px}
  .market-link{display:inline-block;padding:4px 10px;background:#fff8e6;border:1px solid #f0d976;color:#6c5005;font-size:11px;font-weight:700;border-radius:4px;text-decoration:none;letter-spacing:.2px;transition:all .15s}
  .market-link:hover{background:#a05a00;color:#fff;border-color:#a05a00;text-decoration:none}
  .market-link.disabled{background:#f5f7fa;color:#9aa6b3;border-color:#e3e8ef;cursor:default}
  .market-link.disabled:hover{background:#f5f7fa;color:#9aa6b3;border-color:#e3e8ef}
  .item .qty{display:flex;align-items:center;gap:5px;flex-shrink:0}
  .item .qty span{font-size:11px;color:var(--muted)}
  .item .qty input{width:54px;padding:6px 8px;border:1px solid var(--border);border-radius:4px;font:inherit;font-size:13px;text-align:center}
  .item.checked{border-color:var(--teal);background:#f5f9f7}

  /* 연락처 폼 */
  .row{margin-bottom:14px}
  .row label{display:block;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:6px}
  .row .req{color:#b94545;margin-left:3px}
  .row input[type=text],.row input[type=email],.row select,.row textarea{
    width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:6px;font:inherit;color:var(--text);background:#fff;outline:none;
  }
  .row input:focus,.row select:focus,.row textarea:focus{border-color:var(--teal)}
  .row textarea{min-height:88px;resize:vertical}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.grid{grid-template-columns:1fr}}

  .summary{background:#f5f9f7;border:1px solid var(--teal);border-radius:6px;padding:12px 14px;margin-bottom:18px}
  .summary .title{font-size:11px;font-weight:700;color:var(--teal);letter-spacing:.05em;margin-bottom:6px;text-transform:uppercase}
  .summary ul{list-style:none;font-size:13px;color:var(--text)}
  .summary li{padding:3px 0}
  .summary .empty{color:var(--muted);font-size:12px}

  .btn{padding:11px 18px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text);font:inherit;font-weight:700;font-size:14px;cursor:pointer;transition:all .15s}
  .btn:hover{border-color:var(--teal);color:var(--teal)}
  .btn-primary{background:var(--teal);color:#fff;border-color:var(--teal)}
  .btn-primary:hover{background:#155b48;color:#fff}
  .btn-row{display:flex;justify-content:space-between;gap:8px;margin-top:18px}

  .err{color:#b94545;font-size:12px;margin-top:6px;display:none}
  .err.show{display:block}

  .no-setup{padding:32px;text-align:center;color:var(--muted);font-size:13px}
  .no-setup a{color:var(--teal);font-weight:700}

  .foot{margin-top:32px;padding-top:14px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);text-align:center}
  .foot a{margin:0 6px}

  /* Modal 모드 — iframe 안에서 사용 시 헤더·푸터 숨김 */
  body.modal-mode .head,
  body.modal-mode .foot{display:none}
  body.modal-mode{background:#fff}
  body.modal-mode .container{padding:14px 16px}

  /* Thank you 화면 */
  .thank-you{display:none;text-align:center;padding:40px 20px}
  .thank-you.show{display:block}
  .thank-you .ty-icon{font-size:36px;color:var(--teal);margin-bottom:14px}
  .thank-you h2{font-size:22px;color:var(--navy);font-weight:800;margin-bottom:8px}
  .thank-you p{font-size:13.5px;color:var(--muted)}

</style>
</head>
<body>
<script>if(new URLSearchParams(location.search).get('modal')==='1'){document.documentElement.classList.add('modal-mode');document.body&&document.body.classList.add('modal-mode');setTimeout(()=>{document.body.classList.add('modal-mode')},0);}</script>

<div class="container">
  <div class="head">
    <a href="/index.html"><span>Cellab</span> 셀렙</a>
    <div class="sub">정량펌프·소모품 한국 공식 총판</div>
  </div>

  <h1>견적 문의</h1>
  <p class="lead" id="lead">필요한 부품을 선택하고 수량을 입력하세요.</p>
  <div class="setup-title" id="setupTitle"></div>

  <div class="progress">
    <span class="step active" id="prog1">1. 부품 선택</span>
    <span class="step" id="prog2">2. 연락처</span>
  </div>

  <form id="inquiryForm" action="https://formspree.io/f/mqendaqe" method="POST">

    <!-- Step 1 — 부품 선택 -->
    <div class="form" id="step1Section">
      <div id="itemsList">
        <p style="color:var(--muted);font-size:13px">불러오는 중...</p>
      </div>
      <div class="btn-row">
        <span></span>
        <button type="button" class="btn btn-primary" onclick="goStep2()">견적문의 보내기 →</button>
      </div>
      <div class="err" id="step1Err">최소 1개 이상의 부품을 선택해 주세요.</div>
    </div>

    <!-- Step 2 — 연락처 -->
    <div class="form" id="step2Section" style="display:none">

      <div class="summary">
        <div class="title">선택한 부품</div>
        <ul id="summaryList"><li class="empty">선택 없음</li></ul>
      </div>

      <input type="hidden" name="setup_id" id="setupIdHidden">
      <input type="hidden" name="setup_title" id="setupTitleHidden">
      <input type="hidden" name="items_selected" id="itemsSelected">

      <div class="grid">
        <div class="row">
          <label>회사·연구실명 <span class="req">*</span></label>
          <input type="text" name="org" required>
        </div>
        <div class="row">
          <label>담당자명 <span class="req">*</span></label>
          <input type="text" name="name" required>
        </div>
      </div>

      <div class="grid">
        <div class="row">
          <label>이메일 <span class="req">*</span></label>
          <input type="email" name="email" required>
        </div>
        <div class="row">
          <label>연락처</label>
          <input type="text" name="phone" placeholder="선택">
        </div>
      </div>

      <div class="row">
        <label>응용 분야</label>
        <select name="application">
          <option value="">선택</option>
          <option value="세포배양">세포배양</option>
          <option value="바이오리액터·발효">바이오리액터·발효</option>
          <option value="마이크로플루이딕">마이크로플루이딕</option>
          <option value="오가노이드·관류">오가노이드·관류</option>
          <option value="카테터·의료기기">카테터·의료기기</option>
          <option value="HPLC·분석">HPLC·분석</option>
          <option value="연료전지·에너지">연료전지·에너지</option>
          <option value="환경·수처리">환경·수처리</option>
          <option value="화학·합성·코팅">화학·합성·코팅</option>
          <option value="기타">기타</option>
        </select>
      </div>

      <div class="row">
        <label>추가 문의 사항</label>
        <textarea name="message" placeholder="셋업 조건·납기 희망일·기타 요청 등"></textarea>
      </div>

      <div class="btn-row">
        <button type="button" class="btn" onclick="goStep1()">← 이전</button>
        <button type="submit" class="btn btn-primary">견적 문의 보내기</button>
      </div>
    </div>

  </form>

  <div class="thank-you" id="thankYou">
    <div class="ty-icon">✓</div>
    <h2>견적 문의가 전송됐습니다</h2>
    <p>곧 답변드리겠습니다.</p>
  </div>

  <div class="foot">
    <a href="/index.html">홈</a> · <a href="/reviews.html">펌프셋업 리뷰</a> · <a href="/recommend.html">펌프 추천</a>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const setupId = params.get('setup');
let setupData = null;
let partsLib  = null; // parts.json 마스터 부품 라이브러리

async function loadSetup() {
  function showGeneralMode(){
    document.getElementById('step1Section').style.display = 'none';
    document.getElementById('step2Section').style.display = 'block';
    document.getElementById('prog1').classList.remove('active');
    document.getElementById('prog1').style.display = 'none';
    document.getElementById('prog2').classList.add('active');
    document.querySelector('.summary').style.display = 'none';
    document.getElementById('lead').textContent = '아래 양식을 작성해주시면 셀렙이 직접 답변드립니다.';
    if (setupId){
      document.getElementById('setupIdHidden').value = setupId;
      document.getElementById('setupTitleHidden').value = setupId.startsWith('wizard:') ? '펌프 추천 위저드 결과' : (setupId === 'general' ? '일반 문의' : setupId);
    }
    const prevBtn = document.querySelector('#step2Section .btn-row .btn:not(.btn-primary)');
    if (prevBtn) prevBtn.style.display = 'none';
  }

  try {
    // parts.json + setups.json 동시 로드
    const [setupsRes, partsRes] = await Promise.all([
      fetch('_build/setups.json', {cache:'no-store'}),
      fetch('_build/parts.json',  {cache:'no-store'})
    ]);
    const setupsData = await setupsRes.json();
    partsLib = await partsRes.json();

    if (!setupId || !setupsData.setups[setupId]) {
      showGeneralMode();
      return;
    }
    setupData = setupsData.setups[setupId];
    document.getElementById('setupTitle').textContent = setupData.title;
    document.getElementById('setupIdHidden').value = setupId;
    document.getElementById('setupTitleHidden').value = setupData.title;

    // setups.items가 ID 배열(신규)이면 parts.json에서 join, 객체 배열(레거시)이면 그대로
    const resolved = resolveItems(setupData.items);
    renderItems(resolved);
  } catch (e) {
    showGeneralMode();
  }
}

// items 배열을 parts.json과 join — ID 배열·객체 배열 양쪽 호환
function resolveItems(items){
  return items.map(it => {
    if (typeof it === 'string'){
      // 신규: 부품 ID 참조
      const part = partsLib && partsLib.parts && partsLib.parts[it];
      if (!part) return { id: it, name: it, spec: '(부품 라이브러리에 없음)', url_group: null };
      return { id: it, ...part };
    }
    // 레거시: 객체 그대로
    return it;
  });
}

function getMarketUrl(urlGroupId){
  if (!urlGroupId || !partsLib || !partsLib.url_groups) return null;
  const g = partsLib.url_groups[urlGroupId];
  if (!g || !g.navi_url || g.navi_url.startsWith('TODO_')) return null;
  return g.navi_url;
}

function renderItems(items) {
  let html = '';
  items.forEach((it, i) => {
    const naviUrl = getMarketUrl(it.url_group);
    const marketBtn = naviUrl
      ? `<a class="market-link" href="${escapeHtml(naviUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">나비엠알오에서 보기 →</a>`
      : `<span class="market-link disabled" title="마켓 URL 미등록">마켓 등록 예정</span>`;
    html += `
      <label class="item" data-index="${i}">
        <input type="checkbox" name="item_${i}" value="${escapeHtml(it.name)}" onchange="toggleItem(this)">
        <div class="info">
          <div class="name">${escapeHtml(it.name)}</div>
          <div class="spec">${escapeHtml(it.spec)}</div>
          <div class="market-row">${marketBtn}</div>
        </div>
        <div class="qty">
          <span>수량</span>
          <input type="number" name="qty_${i}" min="1" value="1">
        </div>
      </label>
    `;
  });
  document.getElementById('itemsList').innerHTML = html;
}

function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function toggleItem(cb) {
  const item = cb.closest('.item');
  if (cb.checked) item.classList.add('checked');
  else item.classList.remove('checked');
}

function getSelected() {
  const items = [];
  document.querySelectorAll('.item input[type=checkbox]:checked').forEach(cb => {
    const item = cb.closest('.item');
    const name = item.querySelector('.name').textContent;
    const spec = item.querySelector('.spec').textContent;
    const qty = item.querySelector('input[type=number]').value || '1';
    items.push({name, spec, qty});
  });
  return items;
}

function goStep2() {
  const selected = getSelected();
  if (selected.length === 0) {
    document.getElementById('step1Err').classList.add('show');
    return;
  }
  document.getElementById('step1Err').classList.remove('show');

  const sumList = document.getElementById('summaryList');
  sumList.innerHTML = selected.map(s =>
    `<li>• ${escapeHtml(s.name)} <span style="color:var(--muted)">— ${escapeHtml(s.spec)} × ${s.qty}</span></li>`
  ).join('');

  const txt = selected.map(s => `${s.name} (${s.spec}) × ${s.qty}`).join('\n');
  document.getElementById('itemsSelected').value = txt;

  document.getElementById('step1Section').style.display = 'none';
  document.getElementById('step2Section').style.display = 'block';
  document.getElementById('prog1').classList.remove('active');
  document.getElementById('prog2').classList.add('active');
  document.getElementById('lead').textContent = '연락처 정보를 입력해 주세요.';
  window.scrollTo(0,0);
}

function goStep1() {
  document.getElementById('step1Section').style.display = 'block';
  document.getElementById('step2Section').style.display = 'none';
  document.getElementById('prog2').classList.remove('active');
  document.getElementById('prog1').classList.add('active');
  document.getElementById('lead').textContent = '필요한 부품을 선택하고 수량을 입력하세요.';
  window.scrollTo(0,0);
}

document.getElementById('inquiryForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const form = e.target;
  const submitBtn = form.querySelector('button[type=submit]');
  const origText = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.textContent = '전송 중...';

  // GA4 이벤트
  if (typeof gtag === 'function') {
    gtag('event', 'inquiry_submit', {
      setup_id: setupId,
      items: document.getElementById('itemsSelected').value
    });
  }

  try {
    const res = await fetch(form.action, {
      method: 'POST',
      headers: {'Accept': 'application/json'},
      body: new FormData(form)
    });
    if (res.ok) {
      // 성공 — Thank you 표시
      document.getElementById('step1Section').style.display = 'none';
      document.getElementById('step2Section').style.display = 'none';
      document.querySelector('.progress').style.display = 'none';
      document.getElementById('thankYou').classList.add('show');
      // 부모(iframe 모달)에 알림
      if (window.parent !== window) {
        try { window.parent.postMessage({type:'inquiry_submitted'}, '*'); } catch(_){}
      }
    } else {
      alert('전송 실패. 다시 시도해 주세요.');
      submitBtn.disabled = false;
      submitBtn.textContent = origText;
    }
  } catch(err) {
    alert('오류: ' + err.message);
    submitBtn.disabled = false;
    submitBtn.textContent = origText;
  }
});

loadSetup();
</script>

</body>
</html>
