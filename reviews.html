<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --navy:#0a2540;--teal:#1a6e56;--text:#1a2332;--muted:#5a6779;--border:#e3e8ef;--bg:#f7f9fc;--accent:#3a7bd5;
  }
  html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:var(--text);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:var(--teal);text-decoration:none}
  a:hover{text-decoration:underline}

  /* 헤더 */
  .site-header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
  .site-header-inner{max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:16px}
  .site-logo{font-size:20px;font-weight:800;color:var(--navy);letter-spacing:-.02em;flex:1}
  .site-logo span{color:var(--teal)}
  .site-logo:hover{text-decoration:none}
  .site-nav{flex:1;display:flex;justify-content:center;gap:22px;font-size:13.5px;font-weight:600;color:var(--muted)}
  .site-nav a{color:var(--muted)}
  .site-nav a:hover{color:var(--teal);text-decoration:none}
  .site-nav .active{color:var(--teal)}
  .site-actions{flex:1;display:flex;justify-content:flex-end}
  .site-login{padding:7px 14px;background:#f5f9f7;color:var(--navy);font-size:12.5px;font-weight:700;border-radius:6px;border:1px solid var(--border);text-decoration:none;transition:all .15s}
  .site-login:hover{background:var(--teal);color:#fff;border-color:var(--teal);text-decoration:none}
  @media(max-width:760px){.site-nav{flex:none;gap:14px;font-size:12.5px}.site-logo{flex:none}.site-actions{flex:none;margin-left:auto}.site-header-inner{flex-wrap:wrap}}

  /* 페이지 헤드 */
  .page-head{background:#fff;border-bottom:1px solid var(--border);padding:36px 24px 26px}
  .page-head-inner{max-width:1200px;margin:0 auto}
  .breadcrumb{font-size:12px;color:var(--muted);margin-bottom:10px}
  .breadcrumb a{color:var(--muted)}
  .page-head h1{font-size:26px;font-weight:800;color:var(--navy);letter-spacing:-.02em;margin-bottom:6px}
  .page-head .desc{font-size:13.5px;color:var(--muted)}

  /* 컨트롤 (검색·정렬) */
  .toolbar{max-width:1200px;margin:0 auto;padding:24px 24px 0;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .search-box{flex:1;max-width:360px;position:relative}
  .search-box input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border);border-radius:6px;font:inherit;font-size:13.5px;background:#fff;outline:none}
  .search-box input:focus{border-color:var(--teal)}
  .search-box::before{content:"⌕";position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
  .sort-box{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted)}
  .sort-box select{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font:inherit;font-size:12.5px;background:#fff;color:var(--text)}
  .total-count{margin-left:auto;font-size:12.5px;color:var(--muted)}
  .total-count strong{color:var(--teal);font-weight:800}

  /* 필터 */
  .filters-wrap{max-width:1200px;margin:0 auto;padding:14px 24px}
  .filters{display:flex;gap:6px;flex-wrap:wrap}
  .filter-btn{padding:7px 13px;border:1px solid var(--border);background:#fff;color:var(--text);border-radius:18px;font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
  .filter-btn:hover{border-color:var(--teal);color:var(--teal)}
  .filter-btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}

  /* 카드 그리드 */
  .grid-wrap{max-width:1200px;margin:0 auto;padding:8px 24px 56px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
  .card{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:all .15s;display:flex;flex-direction:column;text-decoration:none;color:inherit}
  .card:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:0 8px 20px rgba(10,37,64,.06);text-decoration:none}
  .card .card-img{aspect-ratio:2/1;background:linear-gradient(135deg,#eaf1f9 0%,#f5f9f7 100%);overflow:hidden;display:block;border-bottom:1px solid var(--border)}
  .card .card-img img{width:100%;height:100%;object-fit:contain;display:block}
  .card .card-img.placeholder{display:grid;place-items:center;color:#a9b8cc;font-size:11.5px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
  .card .card-body{padding:18px 20px;display:flex;flex-direction:column;flex:1}
  .card .card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
  .card .card-tags .tag{font-size:10.5px;color:var(--teal);background:#f5f9f7;padding:2px 7px;border-radius:8px;font-weight:600}
  .card .card-tags .tag.journal{background:#fff4e6;color:#a05a00;border:1px solid #ffd9a8}
  .card .card-tags .tag.cite{background:#eef1f5;color:var(--navy)}
  .card h3{font-size:16px;font-weight:800;color:var(--navy);line-height:1.4;margin-bottom:8px;letter-spacing:-.01em}
  .card .summary{font-size:13px;color:var(--muted);line-height:1.6;flex:1;margin-bottom:12px}
  .card .meta{font-size:11.5px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:10px;margin-top:auto}
  .card .meta .application{color:var(--teal);font-weight:600}

  .empty{text-align:center;padding:60px;color:var(--muted);font-size:14px;background:#fff;border:1px dashed var(--border);border-radius:10px}

  /* 푸터 */
  .site-foot{background:#fff;border-top:1px solid var(--border);padding:24px;font-size:12px;color:var(--muted);text-align:center}
  .site-foot a{margin:0 6px;color:var(--muted)}
  .site-foot a:hover{color:var(--teal)}

  @media(max-width:600px){
    .page-head{padding:24px 18px 18px}
    .page-head h1{font-size:21px}
    .toolbar,.filters-wrap,.grid-wrap{padding-left:18px;padding-right:18px}
    .total-count{margin-left:0;width:100%}
    .grid{grid-template-columns:1fr}
  }
</style>

<body>

<header class="site-header">
  <div class="site-header-inner">
    <a class="site-logo" href="/index.html"><span>Cellab</span> 셀렙</a>
    <nav class="site-nav">
      <a href="/reviews.html" class="active">펌프셋업 리뷰</a>
      <a href="/recommend.html">펌프 추천</a>
      <a href="/Leadfluid-2025-Catalog.pdf" target="_blank" rel="noopener">제품 카탈로그</a>
    </nav>
    <div class="site-actions">
      <a class="site-login" href="/login.html">로그인</a>
    </div>
  </div>
</header>

<section class="page-head">
  <div class="page-head-inner">
    <div class="breadcrumb"><a href="/index.html">홈</a> &nbsp;›&nbsp; 펌프셋업 리뷰</div>
    <h1>펌프셋업 리뷰</h1>
    <div class="desc">논문 기반 셋업 분석 — 검색·응용 분야 필터·정렬</div>
  </div>
</section>

<div class="toolbar">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="제목·키워드·모델로 검색" oninput="renderPosts()">
  </div>
  <div class="sort-box">
    <span>정렬</span>
    <select id="sortSelect" onchange="renderPosts()">
      <option value="date_desc">최신순</option>
      <option value="date_asc">오래된순</option>
      <option value="title_asc">제목순</option>
    </select>
  </div>
  <div class="total-count">총 <strong id="totalCount">0</strong>편</div>
</div>

<div class="filters-wrap">
  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="all" onclick="filterCat('all')">전체</button>
    <button class="filter-btn" data-cat="세포배양" onclick="filterCat('세포배양')">세포배양</button>
    <button class="filter-btn" data-cat="바이오리액터·발효" onclick="filterCat('바이오리액터·발효')">바이오리액터·발효</button>
    <button class="filter-btn" data-cat="마이크로플루이딕" onclick="filterCat('마이크로플루이딕')">마이크로플루이딕</button>
    <button class="filter-btn" data-cat="오가노이드·관류" onclick="filterCat('오가노이드·관류')">오가노이드·관류</button>
    <button class="filter-btn" data-cat="카테터·의료기기" onclick="filterCat('카테터·의료기기')">카테터·의료기기</button>
    <button class="filter-btn" data-cat="HPLC·분석" onclick="filterCat('HPLC·분석')">HPLC·분석</button>
    <button class="filter-btn" data-cat="연료전지·에너지" onclick="filterCat('연료전지·에너지')">연료전지·에너지</button>
    <button class="filter-btn" data-cat="환경·수처리" onclick="filterCat('환경·수처리')">환경·수처리</button>
    <button class="filter-btn" data-cat="화학·합성·코팅" onclick="filterCat('화학·합성·코팅')">화학·합성·코팅</button>
    <button class="filter-btn" data-cat="기타" onclick="filterCat('기타')">기타</button>
  </div>
</div>

<main class="grid-wrap">
  <div class="grid" id="postGrid">
    <div class="empty" style="grid-column:1/-1">불러오는 중...</div>
  </div>
</main>

<footer class="site-foot">
  <div>
    <a href="/index.html">홈</a> ·
    <a href="/reviews.html">펌프셋업 리뷰</a> ·
    <a href="/recommend.html">펌프 추천</a> ·
    <a href="/Leadfluid-2025-Catalog.pdf" target="_blank" rel="noopener">제품 카탈로그</a>
  </div>
  <div style="margin-top:8px">© Cellab — R&amp;D Pumps and Consumables</div>
</footer>

<script>
let allPosts = [];
let activeCat = 'all';

async function loadPosts() {
  try {
    const res = await fetch('_build/posts.json', {cache:'no-store'});
    const data = await res.json();
    allPosts = data.posts || [];
    renderPosts();
  } catch (e) {
    document.getElementById('postGrid').innerHTML =
      '<div class="empty" style="grid-column:1/-1">글 목록을 불러올 수 없습니다.</div>';
  }
}

function renderPosts() {
  // 1) 카테고리 필터
  let filtered = activeCat === 'all'
    ? allPosts.slice()
    : allPosts.filter(p => p.application === activeCat);

  // 2) 검색
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (q) {
    filtered = filtered.filter(p => {
      const hay = (p.title + ' ' + p.summary + ' ' + (p.tags||[]).join(' ') + ' ' + (p.model_focus||''))
        .toLowerCase();
      return hay.includes(q);
    });
  }

  // 3) 정렬
  const sort = document.getElementById('sortSelect').value;
  if (sort === 'date_desc') filtered.sort((a,b) => (b.date||'').localeCompare(a.date||''));
  else if (sort === 'date_asc') filtered.sort((a,b) => (a.date||'').localeCompare(b.date||''));
  else if (sort === 'title_asc') filtered.sort((a,b) => (a.title||'').localeCompare(b.title||''));

  document.getElementById('totalCount').textContent = filtered.length;

  if (filtered.length === 0) {
    document.getElementById('postGrid').innerHTML =
      '<div class="empty" style="grid-column:1/-1">조건에 맞는 글이 없습니다.</div>';
    return;
  }

  const html = filtered.map(p => {
    const tagsHtml = (p.tags || []).slice(0, 2).map(t =>
      `<span class="tag">${escapeHtml(t)}</span>`
    ).join('');
    const journalChip = p.journal ? `<span class="tag journal">${escapeHtml(p.journal)}</span>` : '';
    const citeChip    = (p.citations != null) ? `<span class="tag cite">cite ${escapeHtml(p.citations)}</span>` : '';
    const imgHtml = p.image
      ? `<div class="card-img"><img src="${escapeHtml(p.image)}" alt="${escapeHtml(p.title)}" loading="lazy"></div>`
      : `<div class="card-img placeholder">Setup Diagram</div>`;
    return `
      <a class="card" href="${escapeHtml(p.url)}">
        ${imgHtml}
        <div class="card-body">
          <div class="card-tags">${journalChip}${citeChip}${tagsHtml}</div>
          <h3>${escapeHtml(p.title)}</h3>
          <div class="summary">${escapeHtml(p.summary)}</div>
          <div class="meta">
            <span>${escapeHtml(p.date)}</span>
            <span class="application">${escapeHtml(p.application || '')}</span>
          </div>
        </div>
      </a>
    `;
  }).join('');
  document.getElementById('postGrid').innerHTML = html;
}

function filterCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  renderPosts();
  if (typeof gtag === 'function') {
    gtag('event', 'filter_application', {category: cat, page: 'reviews'});
  }
}

function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

loadPosts();
</script>

</body>
</html>
