      var okD = state.d === "전체" || c.d === state.d;
      if(!okD) return false;
      if(!q) return true;
      var hay = (c.q + " " + c.h + " " + c.k + " " + c.d).toLowerCase();
      return hay.indexOf(q) !== -1;
    });
    if(list.length === 0){
      grid.innerHTML = '';
      countEl.innerHTML = '';
      var qtxt = state.q ? '‘'+esc(state.q)+'’에 맞는' : '해당 조건의';
      grid.insertAdjacentHTML('beforeend', '<div class="g-empty" style="grid-column:1/-1">'+qtxt+' 가이드가 아직 없습니다.<br><button type="button" class="g-reqbtn" onclick="openGReq()">이 주제로 실험가이드 요청하기 →</button></div>');
      return;
    }
    countEl.innerHTML = '가이드 <b>'+list.length+'</b>개';
    grid.innerHTML = list.map(cardHTML).join('');
  }

  filtersEl.addEventListener('click', function(e){
    var btn = e.target.closest('.g-fbtn');
    if(!btn) return;
    Array.prototype.forEach.call(filtersEl.querySelectorAll('.g-fbtn'), function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    state.d = btn.getAttribute('data-d');
    render();
  });

  searchEl.addEventListener('input', function(){
    state.q = searchEl.value;
    render();
  });

  window.openGReq = function(){
    var m = document.getElementById('gReqModal'); if(!m) return;
    var t = document.getElementById('gReqTopic'); if(t && !t.value) t.value = state.q || '';
    m.classList.add('open');
    if(typeof gtag==='function') gtag('event','guide_request_open');
  };
  window.closeGReq = function(){ var m = document.getElementById('gReqModal'); if(m) m.classList.remove('open'); };
  var gReqForm = document.getElementById('gReqForm');
  if(gReqForm){ gReqForm.addEventListener('submit', async function(e){
    e.preventDefault();
    var f = e.target, btn = f.querySelector('.g-reqsubmit'), orig = btn.textContent;
    btn.disabled = true; btn.textContent = '전송 중…';
    try{
      var res = await fetch(f.action, { method:'POST', headers:{'Accept':'application/json'}, body:new FormData(f) });
      if(res.ok){ f.style.display='none'; document.getElementById('gReqDone').style.display='block'; if(typeof gtag==='function') gtag('event','guide_request_submit'); }
      else { btn.disabled=false; btn.textContent=orig; alert('전송에 실패했습니다. 잠시 후 다시 시도해 주세요.'); }
    }catch(_){ btn.disabled=false; btn.textContent=orig; alert('네트워크 오류가 발생했습니다.'); }
  }); }

  render();
})();
</script>
</body>
</html>
