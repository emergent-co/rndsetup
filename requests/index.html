<!DOCTYPE html>
<!-- 배포 경로: cellab.kr/requests/index.html  (메뉴 '개발 요청')
     운영: 요청자는 이메일로 보냄 → 관리자가 아래 REQUESTS 목록에 한 줄 추가/수정만 하면 보드가 자동 갱신.
     백엔드 없음(정적). 유지보수 = 목록 편집뿐. -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>개발 요청 게시판 — 펌프 제어 프로그램 | Cellab</title>
<meta name="description" content="펌프 제어 프로그램에 필요한 기능을 요청하고, 검토·개발·완료 진행 상황을 공개로 확인하세요.">
<link rel="canonical" href="https://cellab.kr/requests/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1A1A1A;--gray:#6B6B6B;--gray-2:#9A9A9A;--green:#1A6E56;--green-bg:#F3F8F5;--navy:#0A2540;
        --amber:#B26B12;--amber-bg:#FBF3E6;--line:#EAEAEA;--bg:#fff;
        --serif:"Noto Serif KR",Georgia,serif;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.65;word-break:keep-all;overflow-wrap:break-word}
  a{text-decoration:none;color:inherit}
  h1,h2{font-family:var(--serif);letter-spacing:-.3px;color:var(--ink)}
  .wrap{max-width:920px;margin:0 auto;padding:0 24px}
  header{border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:20}
  .nav{display:flex;align-items:center;justify-content:space-between;height:64px;max-width:1080px;margin:0 auto;padding:0 24px}
  .brand{font-family:var(--serif);font-weight:700;font-size:21px}.brand b{color:var(--green)}
  .menu{display:flex;gap:24px;align-items:center}.menu a{font-size:15px;color:var(--gray);font-weight:500}
  .menu a:hover{color:var(--ink)} .menu .quote{color:var(--green);font-weight:600}
  .hero{text-align:center;padding:56px 0 36px}
  .hero h1{font-size:40px}.hero p{color:var(--gray);margin:14px auto 0;max-width:540px;font-size:16px}
  .hero .btns{margin-top:26px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .b1{background:var(--ink);color:#fff;padding:13px 22px;border-radius:9px;font-weight:600}
  .b1:hover{background:#000}
  .b2{background:#fff;border:1px solid var(--line);padding:13px 20px;border-radius:9px;font-weight:600}
  /* summary */
  .sum{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:8px 0 28px;border-bottom:1px solid var(--line)}
  .pill{border:1px solid var(--line);border-radius:30px;padding:7px 15px;font-size:13px;font-weight:600;color:var(--gray);cursor:pointer;background:#fff}
  .pill.active{border-color:var(--ink);color:var(--ink)}
  .pill b{color:var(--ink)}
  /* board — 3열 카드 그리드 */
  .board{padding:30px 0 56px;display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:start}
  .req{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff;cursor:pointer;display:flex;flex-direction:column;transition:box-shadow .15s,border-color .15s}
  .req:hover{border-color:var(--green);box-shadow:0 6px 18px rgba(0,0,0,.07)}
  .req-img{aspect-ratio:16/10;background:var(--green-bg);display:flex;align-items:center;justify-content:center;color:var(--gray-2);font-size:12px;font-weight:600;letter-spacing:.04em;border-bottom:1px solid var(--line)}
  .req-img img{width:100%;height:100%;object-fit:cover}
  .req-bd{padding:15px 17px;display:flex;flex-direction:column;gap:7px;flex:1}
  .req-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .req h3{font-family:var(--sans);font-size:16px;font-weight:700;line-height:1.35}
  .req .desc{color:var(--gray);font-size:13.5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .req .meta{font-size:12px;color:var(--gray-2);margin-top:auto;padding-top:4px}
  .badge{font-size:11.5px;font-weight:700;padding:4px 9px;border-radius:7px;white-space:nowrap;flex:0 0 auto}
  .s-req{background:#F0F1F3;color:#5A6573}
  .s-rev{background:var(--amber-bg);color:var(--amber)}
  .s-dev{background:var(--navy);color:#fff}
  .s-done{background:var(--green-bg);color:var(--green)}
  .empty{text-align:center;color:var(--gray-2);padding:40px 0;font-size:14px}
  .legend{font-size:12px;color:var(--gray-2);text-align:center;padding-bottom:40px}
  footer{border-top:1px solid var(--line);padding:26px 0;text-align:center}
  footer .tl{font-size:13px;font-weight:700}.footer .bn{margin-top:10px}
  footer .bn{margin-top:10px;font-size:13px;color:var(--gray)}
  footer .cp{margin-top:8px;font-size:12px;color:var(--gray-2)}
  /* 확대 모달 */
  .req-modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
  .req-modal.open{display:flex}
  .req-modal .box{position:relative;background:#fff;border-radius:14px;max-width:560px;width:100%;max-height:88vh;overflow:auto}
  .req-modal .m-img{aspect-ratio:16/9;background:var(--green-bg);display:flex;align-items:center;justify-content:center;color:var(--gray-2);font-size:13px;font-weight:600}
  .req-modal .m-img img{width:100%;height:100%;object-fit:cover}
  .req-modal .m-bd{padding:22px 24px}
  .req-modal h3{font-family:var(--serif);font-size:22px;margin:8px 0 0}
  .req-modal .m-desc{color:var(--ink);font-size:15px;line-height:1.75;margin-top:12px}
  .req-modal .m-meta{color:var(--gray-2);font-size:13px;margin-top:16px;border-top:1px solid var(--line);padding-top:12px}
  .req-modal .m-close{position:absolute;top:8px;right:12px;font-size:28px;line-height:1;color:#fff;cursor:pointer;text-shadow:0 1px 4px rgba(0,0,0,.5)}
  @media(max-width:900px){.board{grid-template-columns:1fr 1fr}}
  @media(max-width:600px){.board{grid-template-columns:1fr}}
  @media(max-width:680px){.menu{display:none}.hero h1{font-size:30px}}
</style>
<link rel="stylesheet" href="/assets/site.css">
</head>
<body>
<div id="cellab-header"></div>

<section class="hero">
  <div class="wrap">
    <h1>개발 요청 게시판</h1>
    <p>펌프 제어 프로그램에 필요한 기능을 이메일로 보내주시면, 검토 후 아래 대기열에 올리고
       <b>개발 진행 상황을 공개</b>로 보여드립니다.</p>
    <div class="btns">
      <!-- 이메일 요청: 받는 주소·템플릿은 실제 값으로 교체 -->
      <a class="b1" href="mailto:emgt.yhlee@gmail.com?subject=%5B%EA%B0%9C%EB%B0%9C%20%EC%9A%94%EC%B2%AD%5D%20&body=%E2%96%A0%20%EC%9A%94%EC%B2%AD%20%EA%B8%B0%EB%8A%A5%3A%0A%E2%96%A0%20%EC%82%AC%EC%9A%A9%20%EC%83%81%ED%99%A9%2F%EC%9D%B4%EC%9C%A0%3A%0A%E2%96%A0%20%EC%9A%B0%EC%84%A0%EC%88%9C%EC%9C%84(%EC%83%81%2F%EC%A4%91%2F%ED%95%98)%3A%0A%E2%96%A0%20%ED%9A%8C%EC%82%AC%C2%B7%EC%97%B0%EA%B5%AC%EC%8B%A4%3A%0A%E2%96%A0%20%EC%97%B0%EB%9D%BD%EC%B2%98%3A%0A">이메일로 개발 요청 보내기</a>
      <a class="b2" href="#board">진행 상황 보기</a>
    </div>
  </div>
</section>

<section id="board">
  <div class="wrap">
    <div class="sum" id="sum"><!-- JS가 채움 --></div>
    <div class="board" id="boardList"><!-- JS가 채움 --></div>
    <p class="legend">상태 흐름: 요청됨 → 검토중 → 개발중 → 완료 &nbsp;·&nbsp; 모든 요청은 검토 후 게시됩니다.</p>
  </div>
</section>

<!-- 확대 모달 -->
<div class="req-modal" id="reqModal" onclick="if(event.target===this)closeReq()">
  <div class="box">
    <span class="m-close" onclick="closeReq()">×</span>
    <div class="m-img" id="mImg"></div>
    <div class="m-bd">
      <span class="badge" id="mBadge"></span>
      <h3 id="mTitle"></h3>
      <p class="m-desc" id="mDesc"></p>
      <div class="m-meta" id="mMeta"></div>
    </div>
  </div>
</div>

<div id="cellab-footer"></div>
<script src="/assets/site.js" defer></script>

<script>
/* ▼▼▼ 여기만 편집하세요 ▼▼▼
   요청이 이메일로 오면 아래 목록에 한 줄 추가하고, 진행되면 status만 바꾸세요.
   status: "req"(요청됨) → "rev"(검토중) → "dev"(개발중) → "done"(완료) */
// image: 대표 이미지 경로 지정 시 카드/모달에 표시 (예: "/img/req-calib.png"). 비우면 '이미지 준비중' 표시.
const REQUESTS = [
  { title:"유량 자동 캘리브레이션", desc:"튜브 교체 후 실측 유량을 입력하면 보정계수를 자동 계산.", status:"dev",  date:"2026-06-20", note:"개발 중",  image:"" },
  { title:"CSV 로그 자동 내보내기", desc:"유량·누적량 로그를 일정 주기로 CSV 저장.",               status:"rev",  date:"2026-06-24", note:"검토 중",  image:"" },
  { title:"다중 펌프 동시 제어", desc:"여러 BT101을 한 화면에서 개별 제어.",                    status:"req",  date:"2026-06-27", note:"",        image:"" },
  { title:"실시간 유량 그래프", desc:"최근 60초 유량을 실시간 라인 차트로 표시.",               status:"done", date:"2026-06-10", note:"v1.0 반영", image:"" },
];
/* ▲▲▲ 여기까지 ▲▲▲ */

const LABEL = { req:"요청됨", rev:"검토중", dev:"개발중", done:"완료" };
const CLS   = { req:"s-req", rev:"s-rev", dev:"s-dev", done:"s-done" };
const ORDER = ["req","rev","dev","done"];
let filter = "all";

function counts(){
  const c = {all:REQUESTS.length, req:0, rev:0, dev:0, done:0};
  REQUESTS.forEach(r => c[r.status]++);
  return c;
}
function renderSum(){
  const c = counts();
  const items = [["all","전체"],["req","요청됨"],["rev","검토중"],["dev","개발중"],["done","완료"]];
  document.getElementById("sum").innerHTML = items.map(([k,l]) =>
    `<button class="pill ${filter===k?'active':''}" onclick="setFilter('${k}')">${l} <b>${c[k]}</b></button>`
  ).join("");
}
function renderList(){
  const list = REQUESTS
    .filter(r => filter==="all" || r.status===filter)
    .sort((a,b) => ORDER.indexOf(a.status)-ORDER.indexOf(b.status) || b.date.localeCompare(a.date));
  const el = document.getElementById("boardList");
  if(!list.length){ el.innerHTML = `<p class="empty">해당 상태의 요청이 없습니다.</p>`; return; }
  el.innerHTML = list.map(r => {
    const i = REQUESTS.indexOf(r);
    const img = r.image ? `<img src="${r.image}" alt="${r.title}">` : '이미지 준비중';
    return `
    <div class="req" onclick="openReq(${i})">
      <div class="req-img">${img}</div>
      <div class="req-bd">
        <div class="req-top">
          <h3>${r.title}</h3>
          <span class="badge ${CLS[r.status]}">${LABEL[r.status]}</span>
        </div>
        <p class="desc">${r.desc}</p>
        <div class="meta">요청일 ${r.date}${r.note?` · ${r.note}`:""}</div>
      </div>
    </div>`;
  }).join("");
}
function setFilter(k){ filter=k; renderSum(); renderList(); }
function openReq(i){
  const r = REQUESTS[i];
  document.getElementById('mImg').innerHTML = r.image ? `<img src="${r.image}" alt="">` : '이미지 준비중';
  const b = document.getElementById('mBadge'); b.className = 'badge ' + CLS[r.status]; b.textContent = LABEL[r.status];
  document.getElementById('mTitle').textContent = r.title;
  document.getElementById('mDesc').textContent = r.desc;
  document.getElementById('mMeta').textContent = `요청일 ${r.date}${r.note?` · ${r.note}`:''}`;
  document.getElementById('reqModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeReq(){ document.getElementById('reqModal').classList.remove('open'); document.body.style.overflow=''; }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeReq(); });
renderSum(); renderList();
</script>
</body>
</html>
